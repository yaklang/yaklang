# https://taskfile.dev

version: '3'

includes:
  yak: 
    taskfile: ./yak_Taskfile.yml
    dir: ./
  antlr: 
    taskfile: ./common/yak/antlr_Taskfile.yml
    dir: ./common/yak
  generate: 
    taskfile: ./common/generate_Taskfile.yml
    dir: ./common

tasks:
  ssa2llvm_build_embed:
    desc: Build ssa2llvm CLI with embedded runtime (libyak.a)
    cmds:
      - ./common/yak/ssa2llvm/scripts/build_ssa2llvm_cli.sh
    aliases: [s2b]
  yak_build:
    desc: Build Yaklang
    vars:
      binary: '{{if eq OS "windows"}}yak.exe{{else}}yak{{end}}'
    cmds:
      - |
        go build -ldflags "-s -w" -o {{ .binary }} ./common/yak/cmd/yak.go
    generates:
      - '{{ .binary }}'
    aliases: [yb]
  yak_grpc:
    desc: Run the gRPC server on port 8087
    cmds:
      - go run common/yak/cmd/yak.go grpc
    aliases: [yg]
  vulinbox_build:
    desc: Build vulinbox
    cmds:
      - go build -ldflags "-linkmode external -extldflags '-static' -s -w -X 'main.goVersion=$(go version)' -X 'main.gitHash=$(git show -s --format=%H)' -X 'main.buildTime=$(git show -s --format=%cd)'" -o "./vulinbox_$(go env "GOOS")_$( go env "GOARCH"){{if eq OS "windows"}}.exe{{end}}" common/vulinboxrunner/vulinbox.go
    aliases: [vb]
  gen_proto:
    silent: true
    desc: Generate protobuf files
    cmds:
      - ./scripts/gen-yakgrpc.sh
    aliases: [gp,proto]
  install_dep:
    silent: true
    desc: Install golang dependencies and protoc
    cmds:
     - go mod tidy
     - go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.2
     - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
     - echo "download protoc from https://github.com/protocolbuffers/protobuf/releases/tag/v27.3"
  legion_smoke_node_build:
    desc: Build the Legion smoke node without optional HIDS support
    cmds:
      - go build -o ./legion-smoke-node ./cmd/legion-smoke-node
    generates:
      - ./legion-smoke-node
    aliases: [lsnb]
  legion_smoke_node_build_hids:
    desc: Build the Legion smoke node with Linux HIDS support enabled
    cmds:
      - go build -tags hids -o ./legion-smoke-node-hids ./cmd/legion-smoke-node
    generates:
      - ./legion-smoke-node-hids
    aliases: [lsnbh]
  legion_smoke_node_build_hids_linux_amd64:
    desc: Build the Legion smoke node for Linux amd64 with HIDS support enabled
    cmds:
      - GOOS=linux GOARCH=amd64 go build -tags hids -o ./legion-smoke-node-hids-linux-amd64 ./cmd/legion-smoke-node
    generates:
      - ./legion-smoke-node-hids-linux-amd64
    aliases: [lsnbhla]
  test_hids:
    desc: Run Legion HIDS packaging and runtime tests
    cmds:
      - go test ./scannode -run '^(TestNormalizeScanNodeCapabilityKeys.*|TestCapabilityManagerApplyRejectsHIDSCapabilityWhenNotCompiled)$'
      - go test -tags hids ./scannode -run '^(TestHIDSCapabilityHooks|TestCapabilityManager.*(HIDS|StructuredDetail)|TestNormalizeCapabilityEventStatus|TestNormalizeScanNodeCapabilityKeys.*)$'
      - go test -tags hids ./common/hids/runtime ./common/hids/rule ./common/hids/rule/cmd/hids-desired-spec-check
    aliases: [thids]
  hids_spec_check:
    desc: "Validate a HIDS desired spec JSON file (usage: task hids_spec_check -- ./spec.json)"
    cmds:
      - |
        input="{{.CLI_ARGS}}"
        if [ -z "$input" ]; then
          input="-"
        fi
        go run -tags hids ./common/hids/rule/cmd/hids-desired-spec-check --input "$input"
    aliases: [hsc]
