name: Essential Tests

on:
  workflow_dispatch:
    inputs:
      target:
        description: "PR number, branch (e.g. owner:branch for fork), or commit SHA"
        required: false
        default: ""
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "common/**"
      - "scannode/**"
      - ".github/workflows/essential-tests.yml"
      - "go.mod"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-wip:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    outputs:
      should_run_tests: ${{ steps.finalize.outputs.should_run_tests }}
      target_ref: ${{ steps.target.outputs.ref }}
      fork_repo: ${{ steps.target.outputs.fork_repo }}
      is_same_repo: ${{ steps.target.outputs.is_same_repo }}
      is_pull_request: ${{ steps.target.outputs.is_pull_request }}
    steps:
      - name: Determine target revision
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.target }}"

            if [ -z "$INPUT" ] || [ "$INPUT" = "" ]; then
              REF="${{ github.ref_name }}"
              echo "No input provided, using current branch: $REF"
            elif [[ "$INPUT" =~ ^[0-9]+$ ]]; then
              PR_NUM="$INPUT"
              echo "Detected PR number: #$PR_NUM"
              echo "Fetching PR #$PR_NUM information..."

              PR_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM")

              PR_HEAD_SHA=$(echo "$PR_RESPONSE" | jq -r '.head.sha // empty')
              PR_STATE=$(echo "$PR_RESPONSE" | jq -r '.state // empty')
              PR_TITLE=$(echo "$PR_RESPONSE" | jq -r '.title // empty')
              PR_HEAD_REF=$(echo "$PR_RESPONSE" | jq -r '.head.ref // empty')
              PR_HEAD_REPO=$(echo "$PR_RESPONSE" | jq -r '.head.repo.full_name // empty')

              if [ -z "$PR_HEAD_SHA" ] || [ "$PR_HEAD_SHA" = "null" ]; then
                echo "Failed to get PR #$PR_NUM. Please check if the PR exists and is accessible."
                exit 1
              fi

              echo "PR #$PR_NUM: $PR_TITLE"
              echo "PR state: $PR_STATE"
              echo "PR head branch: $PR_HEAD_REPO:$PR_HEAD_REF"
              echo "PR head commit (latest): $PR_HEAD_SHA"

              COMMITS_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM/commits")

              COMMIT_COUNT=$(echo "$COMMITS_RESPONSE" | jq '. | length')
              echo "Total commits in PR: $COMMIT_COUNT"

              if [ "$COMMIT_COUNT" -gt 0 ]; then
                echo "Commits in this PR:"
                echo "$COMMITS_RESPONSE" | jq -r '.[] | "  - \(.sha[0:7]) \(.commit.message | split("\n")[0])"'
              fi

              REF="$PR_HEAD_SHA"
              echo "Using PR head commit (latest): $REF"
            elif [[ "$INPUT" =~ ^[a-f0-9]{40}$ ]] || [[ "$INPUT" =~ ^[a-f0-9]{7,}$ ]]; then
              REF="$INPUT"
              echo "Detected commit SHA: $REF"
            elif [[ "$INPUT" == *":"* ]]; then
              FORK_OWNER=$(echo "$INPUT" | cut -d':' -f1)
              FORK_BRANCH=$(echo "$INPUT" | cut -d':' -f2-)
              REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
              FORK_REPO="$FORK_OWNER/$REPO_NAME"

              echo "Detected fork branch format: $INPUT"
              echo "Fork owner: $FORK_OWNER"
              echo "Branch: $FORK_BRANCH"
              echo "Fork repository: $FORK_REPO"

              REF="$FORK_BRANCH"
              FORK_REPO_FULL="$FORK_REPO"
              echo "fork_repo=$FORK_REPO_FULL" >> $GITHUB_OUTPUT
              echo "Using fork branch: $FORK_REPO_FULL:$FORK_BRANCH"
            else
              REF="$INPUT"
              echo "Detected branch/tag: $REF"
            fi
          else
            echo "is_pull_request=true" >> $GITHUB_OUTPUT
            PR_HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
            PR_BASE_REPO="${{ github.repository }}"

            if [ "$PR_HEAD_REPO" = "$PR_BASE_REPO" ]; then
              echo "is_same_repo=true" >> $GITHUB_OUTPUT
            else
              echo "is_same_repo=false" >> $GITHUB_OUTPUT
              echo "Detected fork PR from: $PR_HEAD_REPO"
              echo "fork_repo=$PR_HEAD_REPO" >> $GITHUB_OUTPUT
            fi
            REF="${{ github.event.pull_request.head.sha }}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_pull_request=false" >> $GITHUB_OUTPUT
            echo "is_same_repo=true" >> $GITHUB_OUTPUT
          fi

          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Final target ref: $REF"

      - name: Initialize run flag
        run: echo "SHOULD_RUN=false" >> $GITHUB_ENV

      - name: 'Check Out'
        if: steps.target.outputs.is_same_repo == 'true'
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.target.outputs.ref || github.ref }}
          repository: ${{ steps.target.outputs.fork_repo || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Pre-Check
        if: steps.target.outputs.is_pull_request == 'true' && steps.target.outputs.is_same_repo == 'true'
        id: pre_check
        uses: ./.github/actions/pre-check
        with:
          failed-labels: 'do-not-merge,work in progress,wip,rfc'
          cache-key-prefix: 'essential-tests'

      - name: Set run flag from Pre-Check
        if: steps.target.outputs.is_pull_request == 'true' && steps.target.outputs.is_same_repo == 'true'
        run: echo "SHOULD_RUN=${{ steps.pre_check.outputs.should_run_tests }}" >> $GITHUB_ENV

      - name: Set run flag to true (workflow_dispatch or fork PRs)
        if: steps.target.outputs.is_pull_request != 'true' || steps.target.outputs.is_same_repo == 'false'
        run: echo "SHOULD_RUN=true" >> $GITHUB_ENV

      - name: Finalize outputs
        id: finalize
        run: echo "should_run_tests=$SHOULD_RUN" >> $GITHUB_OUTPUT
        env:
          SHOULD_RUN: ${{ env.SHOULD_RUN }}

  prepare-yak:
    needs: check-wip
    if: needs.check-wip.outputs.should_run_tests == 'true'
    runs-on: ubuntu-22.04
    outputs:
      yak_artifact_id: ${{ steps.upload_yak.outputs.artifact-id }}
      cache_artifact_id: ${{ steps.upload_yak_cache.outputs.artifact-id }}
      target_ref: ${{ needs.check-wip.outputs.target_ref }}
      fork_repo: ${{ needs.check-wip.outputs.fork_repo }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          repository: ${{ needs.check-wip.outputs.fork_repo || github.repository }}
          ref: ${{ needs.check-wip.outputs.target_ref || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"
          cache: false

      - name: Configure Go build directories
        run: |
          mkdir -p "$RUNNER_TEMP/go-build-cache" "$RUNNER_TEMP/go-mod-cache"
          echo "GOCACHE=$RUNNER_TEMP/go-build-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=$RUNNER_TEMP/go-mod-cache" >> $GITHUB_ENV

      - name: Build yak binary
        env:
          GOCACHE: ${{ env.GOCACHE }}
          GOMODCACHE: ${{ env.GOMODCACHE }}
        run: |
          go build -o "$RUNNER_TEMP/yak" common/yak/cmd/yak.go

      - name: Package yak artifact
        run: |
          ARTIFACT_COPY_LIST="$RUNNER_TEMP/yak|yak" \
          ARTIFACT_PATH="$RUNNER_TEMP/essential-tests-yak.tar.gz" \
          ./scripts/ci/artifact-package.sh

      - name: Upload yak binary
        id: upload_yak
        uses: actions/upload-artifact@v4
        with:
          name: essential-tests-yak
          path: ${{ runner.temp }}/essential-tests-yak.tar.gz
          retention-days: 1
          compression-level: 0

      - name: Package go build cache artifact
        run: |
          ARTIFACT_COPY_LIST="$RUNNER_TEMP/go-build-cache|go-build-cache" \
          ARTIFACT_PATH="$RUNNER_TEMP/essential-tests-yak-cache.tar.gz" \
          ./scripts/ci/artifact-package.sh

      - name: Upload go build cache
        id: upload_yak_cache
        uses: actions/upload-artifact@v4
        with:
          name: essential-tests-yak-cache
          path: ${{ runner.temp }}/essential-tests-yak-cache.tar.gz
          retention-days: 1
          compression-level: 0

  prepare-yakgrpc:
    needs: prepare-yak
    if: needs.prepare-yak.result == 'success'
    runs-on: ubuntu-22.04
    outputs:
      artifact_id: ${{ steps.upload_shared_suite.outputs.artifact-id }}
      target_ref: ${{ needs.prepare-yak.outputs.target_ref }}
      fork_repo: ${{ needs.prepare-yak.outputs.fork_repo }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          repository: ${{ needs.prepare-yak.outputs.fork_repo || github.repository }}
          ref: ${{ needs.prepare-yak.outputs.target_ref || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"
          cache: false

      - name: Download shared go build cache
        uses: actions/download-artifact@v4
        with:
          name: essential-tests-yak-cache
          path: ${{ runner.temp }}/yak-cache-artifact

      - name: Restore shared go build cache
        run: |
          mkdir -p "${{ runner.temp }}/shared-go-cache" "$RUNNER_TEMP/go-mod-cache"
          ARTIFACT_PATH="${{ runner.temp }}/yak-cache-artifact/essential-tests-yak-cache.tar.gz" \
          DEST_DIR="${{ runner.temp }}/shared-go-cache" \
          ARTIFACT_EXPECT_PATHS="go-build-cache" \
          ./scripts/ci/artifact-unpackage.sh
          echo "GOCACHE=${{ runner.temp }}/shared-go-cache/go-build-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=$RUNNER_TEMP/go-mod-cache" >> $GITHUB_ENV

      - name: Generate prepare config
        run: |
          cat > "${{ runner.temp }}/prepare_yakgrpc_test_config.json" <<'CONFIGEOF'
          [
            {"package": "./common/yakgrpc/...", "timeout": "10m"}
          ]
          CONFIGEOF

      - name: Compile shared yakgrpc test binaries
        env:
          GOCACHE: ${{ env.GOCACHE }}
          GOMODCACHE: ${{ env.GOMODCACHE }}
        run: |
          export TEST_BIN_DIR="${{ runner.temp }}/test_binaries"
          export TEST_CONFIG="${{ runner.temp }}/prepare_yakgrpc_test_config.json"
          export COMPILE_WORKERS=2
          export GO_TEST_P=1
          ./scripts/ci/test-compile.sh

      - name: Package shared suite
        run: |
          ARTIFACT_COPY_LIST="${{ runner.temp }}/test_binaries|test_binaries" \
          ARTIFACT_REQUIRE_PATHS="${{ runner.temp }}/test_binaries/compiled_tests.txt" \
          ARTIFACT_PATH="${{ runner.temp }}/essential-tests-yakgrpc.tar.gz" \
          ./scripts/ci/artifact-package.sh

      - name: Upload shared suite
        id: upload_shared_suite
        uses: actions/upload-artifact@v4
        with:
          name: essential-tests-yakgrpc
          path: ${{ runner.temp }}/essential-tests-yakgrpc.tar.gz
          retention-days: 1
          compression-level: 0

  prepare-coreplugin:
    needs: prepare-yak
    if: needs.prepare-yak.result == 'success'
    runs-on: ubuntu-22.04
    outputs:
      artifact_id: ${{ steps.upload_shared_suite.outputs.artifact-id }}
      target_ref: ${{ needs.prepare-yak.outputs.target_ref }}
      fork_repo: ${{ needs.prepare-yak.outputs.fork_repo }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          repository: ${{ needs.prepare-yak.outputs.fork_repo || github.repository }}
          ref: ${{ needs.prepare-yak.outputs.target_ref || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"
          cache: false

      - name: Download shared go build cache
        uses: actions/download-artifact@v4
        with:
          name: essential-tests-yak-cache
          path: ${{ runner.temp }}/yak-cache-artifact

      - name: Restore shared go build cache
        run: |
          mkdir -p "${{ runner.temp }}/shared-go-cache" "$RUNNER_TEMP/go-mod-cache"
          ARTIFACT_PATH="${{ runner.temp }}/yak-cache-artifact/essential-tests-yak-cache.tar.gz" \
          DEST_DIR="${{ runner.temp }}/shared-go-cache" \
          ARTIFACT_EXPECT_PATHS="go-build-cache" \
          ./scripts/ci/artifact-unpackage.sh
          echo "GOCACHE=${{ runner.temp }}/shared-go-cache/go-build-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=$RUNNER_TEMP/go-mod-cache" >> $GITHUB_ENV

      - name: Generate prepare config
        run: |
          cat > "${{ runner.temp }}/prepare_coreplugin_test_config.json" <<'CONFIGEOF'
          [
            {"package": "./common/coreplugin", "timeout": "10m"}
          ]
          CONFIGEOF

      - name: Compile shared coreplugin test binaries
        env:
          GOCACHE: ${{ env.GOCACHE }}
          GOMODCACHE: ${{ env.GOMODCACHE }}
        run: |
          export TEST_BIN_DIR="${{ runner.temp }}/test_binaries"
          export TEST_CONFIG="${{ runner.temp }}/prepare_coreplugin_test_config.json"
          export COMPILE_WORKERS=1
          export GO_TEST_P=1
          ./scripts/ci/test-compile.sh

      - name: Package shared suite
        run: |
          ARTIFACT_COPY_LIST="${{ runner.temp }}/test_binaries|test_binaries" \
          ARTIFACT_REQUIRE_PATHS="${{ runner.temp }}/test_binaries/compiled_tests.txt" \
          ARTIFACT_PATH="${{ runner.temp }}/essential-tests-coreplugin.tar.gz" \
          ./scripts/ci/artifact-package.sh

      - name: Upload shared suite
        id: upload_shared_suite
        uses: actions/upload-artifact@v4
        with:
          name: essential-tests-coreplugin
          path: ${{ runner.temp }}/essential-tests-coreplugin.tar.gz
          retention-days: 1
          compression-level: 0

  test-local:
    name: ${{ matrix.name }}
    needs: prepare-yak
    if: needs.prepare-yak.result == 'success'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Test lowhttp / DNSX"
            test_configs: |
              [
                {"package": "./common/utils/lowhttp", "timeout": "3m", "skip": "TestComputeDigestResponseFromRequest|TestComputeDigestResponseFromRequestEx|TestLowhttpResponse2", "retry": 2, "retry_delay": 5},
                {"package": "./common/utils/lowhttp/poc", "timeout": "20s"},
                {"package": "./common/facades/...", "timeout": "30s"}
              ]

          - name: "Test HttpTpl / Crawler / Crawlerx"
            test_configs: |
              [
                {"package": "./common/yak/httptpl", "timeout": "1m"},
                {"package": "./common/crawlerx/...", "timeout": "5m"},
                {"package": "./common/crawler", "timeout": "20s", "run": "TestMUSTPASS_JSHandle"}
              ]

          - name: "Test MustPass - full yak scripts"
            test_configs: |
              [
                {"package": "./common/yak/yaktest/mustpass", "timeout": "5m"}
              ]

          - name: "Test SFWeb / Integration SyntaxFlow / SFDB / SFVM / SFReport"
            sync_rule: "1"
            test_configs: |
              [
                {"package": "./common/sfweb/...", "timeout": "4m"},
                {"package": "./common/syntaxflow/tests", "timeout": "20s"},
                {"package": "./common/syntaxflow/sfdb/...", "timeout": "20s"},
                {"package": "./common/syntaxflow/sfvm/...", "timeout": "20s"},
                {"package": "./common/yak/ssaapi/sfreport/...", "timeout": "1m"}
              ]
          - name: "Test Utils Infra / Parser / Net in 2min USE gRPC"
            test_configs: |
              [
                {"package": "./common/chunkmaker/...", "timeout": "20s"},
                {"package": "./common/jsonextractor", "timeout": "20s"},
                {"package": "./common/markdownextractor", "timeout": "20s"},
                {"package": "./common/jsonpath", "timeout": "20s"},
                {"package": "./common/domainextractor", "timeout": "20s"},
                {"package": "./common/cve", "timeout": "20s", "run": "TestQueryCVEWithFixName"},
                {"package": "./common/sca/...", "timeout": "20s"},
                {"package": "./common/openapi/...", "timeout": "30s"},
                {"package": "./common/pcapx/pcaputil/...", "timeout": "15s"},
                {"package": "./common/yso/...", "timeout": "20s"},
                {"package": "./common/yserx", "timeout": "20s"},
                {"package": "./common/twofa/...", "timeout": "20s"},
                {"package": "./common/cybertunnel/..."},
                {"package": "./common/javaclassparser/jarwar/..."},
                {"package": "./common/bin-parser/...", "timeout": "1m"},
                {"package": "./common/fp/...", "timeout": "60s"},
                {"package": "./common/javaclassparser/tests/...", "timeout": "30s"},
                {"package": "./common/suricata/...", "timeout": "20s", "run": "^TestMUSTPASS.*$"},
                {"package": "./common/chaosmaker", "timeout": "20s", "run": "^(TestMUSTPASS_CrossVerify|TestMUSTPASS_CrossVerifyGroup|TestGenerateBangPortTrafficBug|TestGenerateHttpTrafficBug)$"},
                {"package": "./common/pcapx", "timeout": "20s", "run": "^TestSmoking_.*$"},
                {"package": "./common/netx/mustpass", "timeout": "20s"},
                {"package": "./common/authhack/...", "timeout": "1m"},
                {"package": "./common/vulinboxagentclient", "timeout": "1m", "run": "TestMUSTPASS_Ping"},
                {"package": "./scannode/...", "timeout": "30s"}
              ]

          - name: "Test Utils Common / Yak Tooling in 2min USE gRPC"
            test_configs: |
              [
                {"package": "./common/yak/cmd/yakcmds/...", "timeout": "20s"},
                {"package": "./common/yak/yaklib/codec", "timeout": "20s"},
                {"package": "./common/yak/cartesian", "timeout": "20s"},
                {"package": "./common/utils/omap/...", "timeout": "30s", "race": true},
                {"package": "./common/utils", "timeout": "1m"},
                {"package": "./common/utils/imageutils/...", "timeout": "20s"},
                {"package": "./common/utils/xml2", "timeout": "10s"},
                {"package": "./common/utils/tlsutils/...", "timeout": "20s"},
                {"package": "./common/utils/linktable/...", "timeout": "10s"},
                {"package": "./common/yak/yaklib", "timeout": "20s", "run": "^TestMUSTPASS_.*$"},
                {"package": "./common/yak/yaklib/tools", "timeout": "1m", "run": "^TestMUSTPASS_Fp.*$"},
                {"package": "./common/utils/dot/...", "timeout": "10s"},
                {"package": "./common/utils/filesys/...", "timeout": "30s"},
                {"package": "./common/utils/bruteutils/.", "timeout": "15s"},
                {"package": "./common/utils/memedit/.", "timeout": "15s"},
                {"package": "./common/yak/yakurl/...", "timeout": "15s"},
                {"package": "./common/utils/ziputil/...", "timeout": "20s"},
                {"package": "./common/utils/yakgit/..."},
                {"package": "./common/utils/suspect"},
                {"package": "./common/yak/antlr4nasl/tests/...", "timeout": "1m"},
                {"package": "./common/utils/gzip_embed/test/...", "timeout": "30s"},
                {"package": "./common/utils/resources_monitor/...", "timeout": "30s"},
                {"package": "./common/yak/cmd/...", "timeout": "30s"},
                {"package": "./common/utils/pingutil", "timeout": "20s", "run": "TestPingAutoConfig"},
                {"package": "./common/mutate_tests", "timeout": "20s"},
                {"package": "./common/fuzztag", "timeout": "20s"},
                {"package": "./common/fuzztagx", "timeout": "20s"},
                {"package": "./common/mutate", "timeout": "30s"},
                {"package": "./common/fuzzx", "timeout": "30s"},
                {"package": "./common/utils/bizhelper/...", "timeout": "20s"},
                {"package": "./common/utils/cli", "timeout": "1m"},
                {"package": "./common/mcp/yakcliconvert", "timeout": "1m"},
                {"package": "./common/yak/yakdoc/...", "timeout": "3m"},
                {"package": "./common/utils/yakgit/yakdiff/...", "timeout": "20s"},
                {"package": "./common/yak/ssaapi/ssaconfig", "timeout": "20s"}
              ]

          - name: "Test SSA Frontend Java / JS(TS|ES)"
            test_configs: |
              [
                {"package": "./common/yak/java/...", "timeout": "5m"},
                {"package": "./common/yak/ssaapi/test/java/...", "timeout": "3m"},
                {"package": "./common/yak/typescript/...", "timeout": "2m"},
                {"package": "./common/yak/ssaapi/test/javascript/...", "timeout": "1m"}
              ]

          - name: "Test SSA Frontend Yak / PHP / Python / Golang / C / SSAAPI Other"
            test_configs: |
              [
                {"package": "./common/yak/yak2ssa/test/...", "timeout": "20s"},
                {"package": "./common/yak/ssaapi/test/yak/...", "timeout": "1m"},
                {"package": "./common/yak/antlr4yak/lsp/...", "timeout": "20s"},
                {"package": "./common/yak/php/...", "timeout": "2m"},
                {"package": "./common/yak/ssaapi/test/php/...", "timeout": "2m"},
                {"package": "./common/yak/python/...", "timeout": "2m"},
                {"package": "./common/yak/ssaapi/test/python/...", "timeout": "1m"},
                {"package": "./common/yak/go2ssa/...", "timeout": "30s"},
                {"package": "./common/yak/antlr4go/...", "timeout": "30s"},
                {"package": "./common/yak/ssaapi/test/golang/...", "timeout": "2m"},
                {"package": "./common/yak/c2ssa/...", "timeout": "30s"},
                {"package": "./common/yak/antlr4c/...", "timeout": "30s"},
                {"package": "./common/yak/ssaapi/test/c/...", "timeout": "2m"},
                {"package": "./common/yak/ssaapi/test/...", "timeout": "2m", "exclude_packages": ["./common/yak/ssaapi/test/yak/...", "./common/yak/ssaapi/test/java/...", "./common/yak/ssaapi/test/javascript/...", "./common/yak/ssaapi/test/php/...", "./common/yak/ssaapi/test/python/...", "./common/yak/ssaapi/test/golang/...", "./common/yak/ssaapi/test/c/...", "./common/yak/ssaapi/test/syntaxflow/...", "./common/yak/ssaapi/test/ssatest/..."]}
              ]

          - name: "Test StaticAnalyze / Builtin SyntaxFlow Rule / SSA / SSA-API / SF Scan"
            test_configs: |
              [
                {"package": "./common/yak/static_analyzer/test/...", "timeout": "20s"},
                {"package": "./common/syntaxflow/sfbuildin/...", "timeout": "5m"},
                {"package": "./common/yak/ssaapi/test/syntaxflow/...", "timeout": "1m"},
                {"package": "./common/syntaxflow/sfanalysis/...", "timeout": "20s"},
                {"package": "./common/yak/ssa/...", "timeout": "20s"},
                {"package": "./common/yak/ssaapi", "timeout": "1m"},
                {"package": "./common/yak/ssaapi/ssareducer", "timeout": "1m"},
                {"package": "./common/yak/ssaapi/test/ssatest/...", "timeout": "1m"},
                {"package": "./common/yak/syntaxflow_scan/...", "timeout": "1m"}
              ]

          - name: "Test AI Aid / React"
            test_configs: |
              [
                {"package": "./common/ai/aid/aireact/...", "timeout": "12m", "parallel": 1}
              ]

          - name: "Test AI Aid / Core / Tool / Memory"
            test_configs: |
              [
                {"package": "./common/ai/aid/...", "timeout": "12m", "parallel": 1, "exclude_packages": ["./common/ai/aid/aireact/...", "./common/ai/aid/test"]}
              ]

          - name: "Test AI Aid Test / RAG / Forge / AIHTTP"
            test_configs: |
              [
                {"package": "./common/ai/aid/test", "timeout": "12m", "parallel": 1, "retry": 1, "retry_delay": 5},
                {"package": "./common/ai/rag/pq/...", "timeout": "60s", "parallel": 1},
                {"package": "./common/ai/rag/hnsw/...", "timeout": "60s", "parallel": 1},
                {"package": "./common/ai/rag/entityrepos/...", "timeout": "60s", "parallel": 1},
                {"package": "./common/ai/rag/vectorstore/...", "timeout": "1m", "run": "^TestMUSTPASS.*$", "parallel": 1},
                {"package": "./common/ai/rag", "timeout": "1m", "run": "^TestMUSTPASS.*$", "parallel": 1},
                {"package": "./common/ai/rag/plugins_rag/...", "timeout": "1m", "run": "^TestMUSTPASS.*$", "parallel": 1},
                {"package": "./common/ai/rag/ragtests/...", "timeout": "1m", "run": "^TestMUSTPASS.*$"},
                {"package": "./common/ai/tests/...", "timeout": "60s", "parallel": 1},
                {"package": "./common/ai/aispec/...", "timeout": "60s", "parallel": 1},
                {"package": "./common/aireducer/...", "timeout": "60s", "parallel": 1},
                {"package": "./common/aiforge/aibp", "timeout": "2m30s", "parallel": 1, "run": "^(TestBuildForgeFromYak|TestNewForgeExecutor)$"},
                {"package": "./common/aiforge", "timeout": "3m", "parallel": 1},
                {"package": "./common/aibalance/...", "timeout": "30s", "parallel": 1},
                {"package": "./common/yakgrpc/aihttp/tests/...", "timeout": "1m"}
              ]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          repository: ${{ needs.prepare-yak.outputs.fork_repo || github.repository }}
          ref: ${{ needs.prepare-yak.outputs.target_ref || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"
          cache: false

      - name: Download shared go build cache
        uses: actions/download-artifact@v4
        with:
          name: essential-tests-yak-cache
          path: ${{ runner.temp }}/yak-cache-artifact

      - name: Download shared yak binary
        uses: actions/download-artifact@v4
        with:
          name: essential-tests-yak
          path: ${{ runner.temp }}/yak-artifact

      - name: Restore shared yak and go build cache
        run: |
          mkdir -p "${{ runner.temp }}/shared-yak" "${{ runner.temp }}/shared-go-cache" "$RUNNER_TEMP/go-mod-cache"
          ARTIFACT_PATH="${{ runner.temp }}/yak-artifact/essential-tests-yak.tar.gz" \
          DEST_DIR="${{ runner.temp }}/shared-yak" \
          ARTIFACT_EXPECT_PATHS="yak" \
          ARTIFACT_EXECUTABLE_PATHS="yak" \
          ./scripts/ci/artifact-unpackage.sh
          ARTIFACT_PATH="${{ runner.temp }}/yak-cache-artifact/essential-tests-yak-cache.tar.gz" \
          DEST_DIR="${{ runner.temp }}/shared-go-cache" \
          ARTIFACT_EXPECT_PATHS="go-build-cache" \
          ./scripts/ci/artifact-unpackage.sh
          echo "GOCACHE=${{ runner.temp }}/shared-go-cache/go-build-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=$RUNNER_TEMP/go-mod-cache" >> $GITHUB_ENV

      - name: Generate test config
        run: |
          cat > "${{ runner.temp }}/test_config.json" <<'CONFIGEOF'
          ${{ matrix.test_configs }}
          CONFIGEOF
          cat "${{ runner.temp }}/test_config.json"

      - name: Compile test binaries
        env:
          GOCACHE: ${{ env.GOCACHE }}
          GOMODCACHE: ${{ env.GOMODCACHE }}
        run: |
          export TEST_BIN_DIR="${{ runner.temp }}/test_binaries"
          export TEST_CONFIG="${{ runner.temp }}/test_config.json"
          export COMPILE_WORKERS=2
          export GO_TEST_P=1
          ./scripts/ci/test-compile.sh

      - name: ${{ matrix.name }}
        run: |
          export YAK_BINARY_PATH="${{ runner.temp }}/shared-yak/yak"
          export TEST_BIN_DIR="${{ runner.temp }}/test_binaries"
          export TEST_TIMEOUT="2m"
          export TEST_VERBOSE="1"
          export TEST_CONFIG="${{ runner.temp }}/test_config.json"
          export SUITE_NAME="${{ matrix.name }}"
          export SUITE_SYNC_RULE="${{ matrix.sync_rule == '1' && '1' || '0' }}"
          ./scripts/ci/test-run-suite.sh

      - name: Generate safe artifact name
        if: failure()
        id: artifact_name
        run: |
          SAFE_NAME=$(echo "${{ matrix.name }}" | sed 's/[^a-zA-Z0-9_-]/_/g')
          echo "name=test_logs_${SAFE_NAME}_${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Upload failure logs (GRPC + test logs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: ${{ runner.temp }}/test_binaries/*.log
          if-no-files-found: warn

  test-prepared-yakgrpc:
    name: ${{ matrix.name }}
    needs: [prepare-yak, prepare-yakgrpc]
    if: needs.prepare-yak.result == 'success' && needs.prepare-yakgrpc.result == 'success'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Test gRPC MUSTPASS MITM"
            artifact_name: "essential-tests-yakgrpc"
            artifact_file: "essential-tests-yakgrpc.tar.gz"
            test_configs: |
              [
                {"package": "./common/yakgrpc/yakit", "timeout": "1m", "run": "^TestMUSTPASS.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_MITM($|_.*|Filter.*)$"}
              ]

          - name: "Test gRPC MUSTPASS MITMV2 / Slow"
            artifact_name: "essential-tests-yakgrpc"
            artifact_file: "essential-tests-yakgrpc.tar.gz"
            test_configs: |
              [
                {"package": "./common/yakgrpc/...", "timeout": "6m", "run": "^TestGRPCMUSTPASS_MITMV2_.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "TestGRPCMUSTPASS_MITMSlowRuleHook"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "TestGRPCMUSTPASS_HTTPFlowSlowSQL"}
              ]

          - name: "Test gRPC MUSTPASS Fuzzer"
            artifact_name: "essential-tests-yakgrpc"
            artifact_file: "essential-tests-yakgrpc.tar.gz"
            test_configs: |
              [
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_HTTPFUZZER.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_HTTPFuzzer.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_HTTP_.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_PluginTrace.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "TestGRPCMUSTPASS_FuzzerConfig"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "TestGRPCMUSTPASS_MaxSize"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^(TestPBTest|TestLargePayload)$"}
              ]

          - name: "Test gRPC MUSTPASS Language"
            artifact_name: "essential-tests-yakgrpc"
            artifact_file: "essential-tests-yakgrpc.tar.gz"
            test_configs: |
              [
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_LANGUAGE.*$"}
              ]

          - name: "Test gRPC MUSTPASS SyntaxFlow | SSA"
            artifact_name: "essential-tests-yakgrpc"
            artifact_file: "essential-tests-yakgrpc.tar.gz"
            sync_rule: "1"
            test_configs: |
              [
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_SyntaxFlow.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_SSA.*$"}
              ]

          - name: "Test gRPC Scan / Hybrid / Common"
            artifact_name: "essential-tests-yakgrpc"
            artifact_file: "essential-tests-yakgrpc.tar.gz"
            test_configs: |
              [
                {"package": "./common/yakgrpc/...", "timeout": "2m", "run": "^TestGRPCMUSTPASS_AnalyzeHTTPFlow.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "2m", "run": "^TestGRPCMUSTPASS_Fingerprint.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "2m", "run": "^TestGRPCMUSTPASS_HybridScan.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "2m", "run": "^TestLARGEGRPCMUSTPASS.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "5m", "run": "^TestGRPCMUSTPASS_COMMON.*$"},
                {"package": "./common/yakgrpc/...", "timeout": "1m", "run": "^TestAITaskWith.*$", "parallel": 1},
                {"package": "./common/yakgrpc/...", "timeout": "2m", "run": "TestGRPCMUSTPASS_AIForge"},
                {"package": "./common/yakgrpc/...", "timeout": "2m", "run": "TestGRPCMUSTPASS_RequestYakURL"}
              ]

          - name: "Test gRPC Other / MCP / AI / Output"
            artifact_name: "essential-tests-yakgrpc"
            artifact_file: "essential-tests-yakgrpc.tar.gz"
            test_configs: |
              [
                {"package": "./common/yakgrpc/...", "timeout": "10m", "skip": "^(TestGRPCMUSTPASS_PluginTrace.*|TestGRPCMUSTPASS_AnalyzeHTTPFlow.*|TestGRPCMUSTPASS_Fingerprint.*|TestGRPCMUSTPASS_HTTP_.*|TestGRPCMUSTPASS_HTTPFUZZER.*|TestGRPCMUSTPASS_HTTPFuzzer.*|TestAITaskWith.*|TestGRPCMUSTPASS_MITM.*|TestGRPCMUSTPASS_MITMV2.*|TestGRPCMUSTPASS_LANGUAGE.*|TestGRPCMUSTPASS_COMMON.*|TestLARGEGRPCMUSTPASS.*|TestGRPCMUSTPASS_SyntaxFlow.*|TestGRPCMUSTPASS_SSA.*|TestGRPCMUSTPASS_FuzzerConfig|TestGRPCMUSTPASS_MaxSize|TestPBTest|TestLargePayload|TestGRPCMUSTPASS_AIForge.*|TestGRPCMUSTPASS_RequestYakURL.*)$"}
              ]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          repository: ${{ needs.prepare-yakgrpc.outputs.fork_repo || github.repository }}
          ref: ${{ needs.prepare-yakgrpc.outputs.target_ref || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate test config
        run: |
          cat > "${{ runner.temp }}/test_config.json" <<'CONFIGEOF'
          ${{ matrix.test_configs }}
          CONFIGEOF
          cat "${{ runner.temp }}/test_config.json"

      - name: Download prepared suite
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/prepared-artifact

      - name: Unpack prepared suite
        run: |
          ARTIFACT_PATH="${{ runner.temp }}/prepared-artifact/${{ matrix.artifact_file }}" \
          DEST_DIR="${{ runner.temp }}/prepared-suite" \
          ARTIFACT_EXPECT_PATHS="test_binaries/compiled_tests.txt" \
          ./scripts/ci/artifact-unpackage.sh

      - name: Download shared yak binary
        uses: actions/download-artifact@v4
        with:
          name: essential-tests-yak
          path: ${{ runner.temp }}/yak-artifact

      - name: Unpack shared yak binary
        run: |
          mkdir -p "${{ runner.temp }}/shared-yak"
          ARTIFACT_PATH="${{ runner.temp }}/yak-artifact/essential-tests-yak.tar.gz" \
          DEST_DIR="${{ runner.temp }}/shared-yak" \
          ARTIFACT_EXPECT_PATHS="yak" \
          ARTIFACT_EXECUTABLE_PATHS="yak" \
          ./scripts/ci/artifact-unpackage.sh

      - name: ${{ matrix.name }}
        run: |
          export YAK_BINARY_PATH="${{ runner.temp }}/shared-yak/yak"
          export TEST_BIN_DIR="${{ runner.temp }}/prepared-suite/test_binaries"
          export TEST_TIMEOUT="2m"
          export TEST_VERBOSE="1"
          export TEST_CONFIG="${{ runner.temp }}/test_config.json"
          export SUITE_NAME="${{ matrix.name }}"
          export SUITE_SYNC_RULE="${{ matrix.sync_rule == '1' && '1' || '0' }}"
          ./scripts/ci/test-run-suite.sh

      - name: Generate safe artifact name
        if: failure()
        id: artifact_name
        run: |
          SAFE_NAME=$(echo "${{ matrix.name }}" | sed 's/[^a-zA-Z0-9_-]/_/g')
          echo "name=test_logs_${SAFE_NAME}_${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Upload failure logs (GRPC + test logs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: ${{ runner.temp }}/prepared-suite/test_binaries/*.log
          if-no-files-found: warn

