  cleanup-yakgrpc-artifact:
    needs: [prepare-yakgrpc, test-prepared-yakgrpc]
    if: needs.prepare-yakgrpc.result == 'success' && needs.test-prepared-yakgrpc.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Delete yakgrpc artifact
        env:
          ARTIFACT_ID: ${{ needs.prepare-yakgrpc.outputs.artifact_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT_LABEL: yakgrpc
        run: |
          ./scripts/ci/artifact-delete.sh

  cleanup-coreplugin-artifact:
    needs: [prepare-coreplugin, test-prepared-coreplugin]
    if: needs.prepare-coreplugin.result == 'success' && needs.test-prepared-coreplugin.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Delete coreplugin artifact
        env:
          ARTIFACT_ID: ${{ needs.prepare-coreplugin.outputs.artifact_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT_LABEL: coreplugin
        run: |
          ./scripts/ci/artifact-delete.sh

  cleanup-yak-artifact:
    needs: [prepare-yak, test-local, test-prepared-yakgrpc, test-prepared-coreplugin]
    if: needs.prepare-yak.result == 'success' && needs.test-local.result == 'success' && needs.test-prepared-yakgrpc.result == 'success' && needs.test-prepared-coreplugin.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Delete shared yak/cache artifacts
        env:
          YAK_ARTIFACT_ID: ${{ needs.prepare-yak.outputs.yak_artifact_id }}
          CACHE_ARTIFACT_ID: ${{ needs.prepare-yak.outputs.cache_artifact_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          for artifact_id in "$YAK_ARTIFACT_ID" "$CACHE_ARTIFACT_ID"; do
            ARTIFACT_ID="$artifact_id" ARTIFACT_LABEL="shared-yak-or-cache" ./scripts/ci/artifact-delete.sh
          done

  post-check:
    name: Save Test Results to Cache
    needs: [check-wip, test-local, test-prepared-yakgrpc, test-prepared-coreplugin]
    if: needs.check-wip.outputs.should_run_tests == 'true' && success()
    runs-on: ubuntu-22.04
    steps:
      - name: 'Check Out'
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || needs.check-wip.outputs.target_ref || github.sha }}

      - name: Run Post-Check (Save Test Results)
        uses: ./.github/actions/post-check
        with:
          cache-key-prefix: 'essential-tests'
