name: Diff-Code-Check

# SSA incremental compile + SyntaxFlow scan logic lives in
# yaklang/yaklang-ci-infra (reusable workflow). This file owns the PR trigger,
# paths filter, concurrency, WIP/pre-check gate, and post-check cache save.
# The heavy SSA work is delegated via `uses:` to the ci-infra repo so the
# CI scripts and workflows can evolve independently of the yaklang source.

on:
  pull_request:
    branches: [main]
    types: [ opened, synchronize, reopened, labeled, unlabeled ]
    paths:
      - "common/**"
      - ".github/workflows/diff-code-check.yml"
      - ".github/actions/security-commenter/action.yml"
      - "common/ssa_bootstrapping/ci_rule/**"
      - "scripts/ssa-risk-tools/**"
      - "scripts/get-yak-version.sh"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-wip:
    runs-on: ubuntu-22.04
    outputs:
      should_run_tests: ${{ steps.pre_check.outputs.should_run_tests }}
    steps:
      - name: 'Check Out'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Pre-Check
        id: pre_check
        uses: ./.github/actions/pre-check
        with:
          failed-labels: 'do-not-merge,work in progress,wip,rfc'
          skip-labels: 'pass-diff-check'
          cache-key-prefix: 'diff-code-check'

  ssa-diff-check:
    needs: [check-wip]
    if: >-
      needs.check-wip.outputs.should_run_tests == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    uses: yaklang/yaklang-ci-infra/.github/workflows/diff-code-check-ssa.yml@main
    with:
      head_sha: ${{ github.event.pull_request.head.sha }}
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  post-check:
    name: Save Scan Results to Cache
    needs: ssa-diff-check
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - name: 'Check Out'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Post-Check (Save Scan Results)
        uses: ./.github/actions/post-check
        with:
          cache-key-prefix: 'diff-code-check'