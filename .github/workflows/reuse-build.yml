name: Reuse-Build-Yak

on:
  workflow_dispatch:
    inputs:
      os:
        description: "System to build"
        required: true
        type: choice
        options:
          - windows
          - windows7
          - windows-arm64
          - darwin-amd64 
          - darwin-arm64
          - linux-amd64
          - linux-arm64
      ee:
        type: boolean
        description: whether to build ee version
        default: false
      sign:
        type: boolean
        description: whether to sign windows executable
        default: false
      build_type:
        description: "Build type: full or yakslim (workflow_call also supports this)"
        required: false
        type: choice
        options:
          - full
          - yakslim
        default: full
  
  workflow_call:
    inputs:
      os:
        description: "System to build"
        required: true
        type: string
      build_type:
        description: "Build type: full or yakslim"
        required: false
        type: string
        default: full
      ee:
        type: boolean
        description: whether to build ee version
        default: false 
      sign:
        type: boolean
        description: whether to sign windows executable
        default: false 

jobs:
  build_and_upload_asset:
    runs-on: ${{ inputs.os == 'windows-arm64' && 'windows-11-arm' || ((inputs.os == 'windows' || inputs.os == 'windows7') && 'windows-latest') || (inputs.os == 'linux-amd64' && 'ubuntu-22.04') || (inputs.os == 'linux-arm64' && 'ubuntu-24.04-arm') || 'macos-14' }}
    steps:
      - uses: actions/checkout@v2
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"
          cache: false
        id: go

      # WoA CGO needs llvm-mingw; stock MinGW/gcc cannot assemble runtime/cgo ARM64 asm.
      - name: Setup llvm-mingw (Windows ARM64)
        if: inputs.os == 'windows-arm64'
        shell: pwsh
        run: |
          & "${{ github.workspace }}/.github/scripts/setup-llvm-mingw-windows-arm64.ps1"

      # - name: Cache Go modules
      #   uses: actions/cache@v3
      #   id: cache-go-modules
      #   with:
      #     path: ~/go/pkg/mod
      #     key: go-modules-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
      #     restore-keys: |
      #       go-modules-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Go Patch for Win7
        if: inputs.os == 'windows7'
        run: |
          cd $(go env GOROOT)
          Get-Content "${{ github.workspace }}\.github\patch_go122\693def151adff1af707d82d28f55dba81ceb08e1.diff" | patch --verbose -R -p 1 
          Get-Content "${{ github.workspace }}\.github\patch_go122\7c1157f9544922e96945196b47b95664b1e39108.diff" | patch --verbose -R -p 1
          Get-Content "${{ github.workspace }}\.github\patch_go122\48042aa09c2f878c4faa576948b07fe625c4707a.diff" | patch --verbose -R -p 1
          cd ${{ github.workspace }}

      # Same OSS download approach as exp-cross-build full builds; install to RUNNER_TEMP
      # and export YAK= so later steps never fall back to compiling the engine.
      - name: Download Yak Binary (for repos-tag / embed-fs-hash / sha256)
        id: download_yak
        shell: bash
        run: |
          echo "::group::Downloading Yak binary from OSS"

          RUNNER_OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          RUNNER_ARCH=$(uname -m)

          if [ "$RUNNER_ARCH" = "x86_64" ]; then
            RUNNER_ARCH_NORM="amd64"
          elif [ "$RUNNER_ARCH" = "amd64" ]; then
            RUNNER_ARCH_NORM="amd64"
          elif [ "$RUNNER_ARCH" = "aarch64" ] || [ "$RUNNER_ARCH" = "arm64" ]; then
            RUNNER_ARCH_NORM="arm64"
          else
            RUNNER_ARCH_NORM="$RUNNER_ARCH"
          fi

          if [ "$RUNNER_OS" = "darwin" ]; then
            BINARY_NAMES=("yak_darwin_${RUNNER_ARCH_NORM}" "yak_darwin_amd64")
          elif [ "$RUNNER_OS" = "linux" ]; then
            BINARY_NAMES=("yak_linux_${RUNNER_ARCH_NORM}")
          elif echo "$RUNNER_OS" | grep -qi "mingw\|msys\|cygwin"; then
            BINARY_NAMES=("yak_windows_${RUNNER_ARCH_NORM}.exe")
          else
            BINARY_NAMES=("yak_${RUNNER_OS}_${RUNNER_ARCH_NORM}")
          fi

          echo "Runner: $RUNNER_OS/$RUNNER_ARCH_NORM"
          echo "Will try to download binaries: ${BINARY_NAMES[*]}"

          VERSIONS_TO_TRY=("latest")
          if SELECTED_VERSION=$(bash ./scripts/get-yak-version.sh --quiet 2>/dev/null); then
            if [ -n "$SELECTED_VERSION" ]; then
              echo "✅ Found suitable version: $SELECTED_VERSION"
              VERSIONS_TO_TRY+=("$SELECTED_VERSION")
            fi
          fi
          echo "Will try versions: ${VERSIONS_TO_TRY[*]}"

          YAK_OSS_BASE="https://yaklang.oss-accelerate.aliyuncs.com"
          INSTALL_DIR="${RUNNER_TEMP:-$HOME/.local/bin}"
          mkdir -p "$INSTALL_DIR"

          for BINARY_NAME in "${BINARY_NAMES[@]}"; do
            for VERSION in "${VERSIONS_TO_TRY[@]}"; do
              DOWNLOAD_URL="${YAK_OSS_BASE}/yak/${VERSION}/${BINARY_NAME}"
              echo "Trying to download from: $DOWNLOAD_URL"

              HTTP_CODE=$(curl -w "%{http_code}" -# -L "$DOWNLOAD_URL" -o yak_dl)
              CURL_EXIT=$?
              if [ $CURL_EXIT -ne 0 ] || [ "$HTTP_CODE" != "200" ]; then
                echo "❌ download failed (curl=$CURL_EXIT http=$HTTP_CODE)"
                rm -f yak_dl
                continue
              fi
              if [ ! -s "yak_dl" ]; then
                echo "❌ Downloaded file is empty"
                rm -f yak_dl
                continue
              fi

              FILE_SIZE=$(stat -f%z yak_dl 2>/dev/null || stat -c%s yak_dl 2>/dev/null || echo "0")
              echo "Downloaded file size: ${FILE_SIZE} bytes"
              if [ "$FILE_SIZE" -lt 1048576 ]; then
                echo "❌ Downloaded file is too small: ${FILE_SIZE} bytes"
                rm -f yak_dl
                continue
              fi

              if [[ "$BINARY_NAME" == *.exe ]]; then
                DEST="$INSTALL_DIR/yak.exe"
              else
                DEST="$INSTALL_DIR/yak"
              fi
              mv -f yak_dl "$DEST"
              chmod +x "$DEST" || true

              VERSION_OUTPUT=$("$DEST" version 2>&1)
              VERSION_EXIT=$?
              if [ $VERSION_EXIT -ne 0 ]; then
                echo "❌ Downloaded binary failed version check: $VERSION_OUTPUT"
                rm -f "$DEST"
                continue
              fi

              echo "Version output: $VERSION_OUTPUT"
              echo "YAK=$DEST" >> "$GITHUB_ENV"
              echo "$INSTALL_DIR" >> "$GITHUB_PATH"
              echo "✅ Successfully downloaded yak from version: $VERSION -> $DEST"
              echo "::endgroup::"
              exit 0
            done
          done

          echo "::error::Failed to download yak from OSS (slim builds do not compile operator yak)"
          echo "Binary names: ${BINARY_NAMES[*]}"
          echo "Versions: ${VERSIONS_TO_TRY[*]}"
          echo "::endgroup::"
          exit 1

      - name: Get Repo tags
        shell: bash
        run: |
          if [ -z "${YAK:-}" ] || [ ! -f "$YAK" ]; then
            echo "::error::YAK operator binary missing; OSS download step must succeed"
            exit 1
          fi
          "$YAK" repos-tag -o tags.txt
          echo "YAK_TAG=$(cat tags.txt)" >> "$GITHUB_ENV"

      - name: Determine Build Tags and Output Name
        id: build_info
        shell: bash
        run: |
          BUILD_TYPE="${{ inputs.build_type }}"
          BUILD_TAGS="gzip_embed"
          OUTPUT_NAME_PREFIX="yak_"
          
          case "$BUILD_TYPE" in
            yakslim)
              BUILD_TAGS="gzip_embed,irify_exclude"
              OUTPUT_NAME_PREFIX="yak-slim_"
              ;;
          esac
          
          echo "BUILD_TAGS=$BUILD_TAGS" >> "$GITHUB_ENV"
          echo "OUTPUT_NAME_PREFIX=$OUTPUT_NAME_PREFIX" >> "$GITHUB_ENV" 

      - name: Slim gate test (irify_exclude)
        if: contains(env.BUILD_TAGS, 'irify_exclude')
        env:
          MOCKEY_CHECK_GCFLAGS: "false"
        run: go test -tags irify_exclude -run '^TestSlimGate_' -timeout 5m ./common/yakgrpc

      - name: Go module download (Linux)
        if: startsWith(inputs.os, 'linux')
        run: go mod download

      - name: Generate Document
        run: go run -gcflags=all="-N -l" common/yak/yakdoc/generate_doc/generate_doc.go common/yak/yakdoc/doc/doc.gob.zst

      - name: Codec Methods Document
        run: go run -gcflags=all="-N -l" common/yak/yaklib/codec/codegrpc/doc/codec_doc.go common/yak/yaklib/codec/codegrpc/codec.gob.zst

      - name: Sync Embed FS Hash to Code
        shell: bash
        run: |
          if [ -z "${YAK:-}" ] || [ ! -f "$YAK" ]; then
            echo "::error::YAK operator binary missing; OSS download step must succeed"
            exit 1
          fi
          "$YAK" embed-fs-hash --override --all

      - name: Install gzip-embed tool
        run: go install ./common/utils/gzip_embed/gzip-embed

      - name: Generate tar.gz resources
        run: |
          gzip-embed -cache --source ./common/ai/aid/aitool/buildinaitools/yakscripttools/yakscriptforai --gz ./common/ai/aid/aitool/buildinaitools/yakscripttools/yakscriptforai.tar.gz --no-embed
          gzip-embed -cache --source ./common/ai/aid/aireact/skills --gz ./common/ai/aid/aireact/skills.tar.gz --root-path --no-embed
          gzip-embed -cache --source ./common/coreplugin/base-yak-plugin --gz ./common/coreplugin/base-yak-plugin.tar.gz --root-path --no-embed
          gzip-embed -cache --source ./common/syntaxflow/sfbuildin/buildin --gz ./common/syntaxflow/sfbuildin/buildin.tar.gz --root-path --no-embed
          gzip-embed -cache --source ./common/aiforge/buildinforge --gz ./common/aiforge/buildinforge.tar.gz --root-path --no-embed

      - name: Initialize License Machine
        if: inputs.ee
        run: go run common/xlic/cmd/initializer.go --ak ${{ secrets.OSS_KEY_ID }} --sk ${{ secrets.OSS_KEY_SECRET }}

      - name: Build for Windows
        if: contains(inputs.os, 'windows')
        shell: pwsh
        env:
          BUILD_TAGS: ${{ env.BUILD_TAGS }}
          OUTPUT_NAME_PREFIX: ${{ env.OUTPUT_NAME_PREFIX }}
        run: |
          $env:GOOS = "windows"
          $env:CGO_ENABLED = "1"
          if ("${{ inputs.os }}" -eq "windows7") {
            $env:GOARCH = "amd64"
            $baseName = "windows_legacy_amd64.exe"
          } elseif ("${{ inputs.os }}" -eq "windows-arm64") {
            if ($env:PROCESSOR_ARCHITECTURE -ne "ARM64") {
              throw "windows-arm64 must build on native ARM64 runner (windows-11-arm), got PROCESSOR_ARCHITECTURE=$($env:PROCESSOR_ARCHITECTURE)"
            }
            $env:GOARCH = "arm64"
            $baseName = "windows_arm64.exe"
          } else {
            $env:GOARCH = "amd64"
            $baseName = "windows_amd64.exe"
          }
          $outputName = "${{ env.OUTPUT_NAME_PREFIX }}" + $baseName
          
          Write-Host "Runner: $env:PROCESSOR_ARCHITECTURE GOOS=$env:GOOS GOARCH=$env:GOARCH CGO_ENABLED=$env:CGO_ENABLED"
          Write-Host "Output file: $outputName"
          
          go build -tags "${{ env.BUILD_TAGS }}" -ldflags "-s -w -X 'main.goVersion=$(go version)' -X 'main.gitHash=$(git show -s --format=%H)' -X 'main.buildTime=$(git show -s --format=%cd)' -X 'main.yakVersion=${{ env.YAK_TAG }}'" -o $outputName -v common/yak/cmd/yak.go
          echo "OUTPUT_NAME=$outputName" >> $env:GITHUB_ENV

      - name: Validate signing secrets
        if: ${{ inputs.sign && contains(inputs.os, 'windows') && !github.event.pull_request }}
        shell: pwsh
        run: |
          $missing = @()
          if (-not "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_URI }}") { $missing += "AZURE_YAK_CODE_SIGN_KEY_VAULT_URI" }
          if (-not "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_APPLICATION_ID }}") { $missing += "AZURE_YAK_CODE_SIGN_KEY_VAULT_APPLICATION_ID" }
          if (-not "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_DIRECTORY_ID }}") { $missing += "AZURE_YAK_CODE_SIGN_KEY_VAULT_DIRECTORY_ID" }
          if (-not "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_CLIENT_SECRET }}") { $missing += "AZURE_YAK_CODE_SIGN_KEY_VAULT_CLIENT_SECRET" }
          if (-not "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_CERT_NAME }}") { $missing += "AZURE_YAK_CODE_SIGN_KEY_VAULT_CERT_NAME" }
          if (-not "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_TIMESTAMP_URL }}") { $missing += "AZURE_YAK_CODE_SIGN_KEY_VAULT_TIMESTAMP_URL" }
          if ($missing.Count -gt 0) {
            throw ("Missing required secrets for signing: " + ($missing -join ", "))
          }

      - name: Set up .NET (for AzureSignTool)
        if: ${{ inputs.sign && contains(inputs.os, 'windows') && !github.event.pull_request }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install AzureSignTool
        if: ${{ inputs.sign && contains(inputs.os, 'windows') && !github.event.pull_request }}
        shell: pwsh
        run: |
          dotnet tool install --global AzureSignTool
          "$env:USERPROFILE\\.dotnet\\tools" >> $env:GITHUB_PATH
          AzureSignTool --version

      - name: Sign Windows executable (Azure Key Vault)
        if: ${{ inputs.sign && contains(inputs.os, 'windows') && !github.event.pull_request }}
        shell: pwsh
        run: |
          AzureSignTool sign `
            -kvu "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_URI }}" `
            -kvi "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_APPLICATION_ID }}" `
            -kvt "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_DIRECTORY_ID }}" `
            -kvs "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_CLIENT_SECRET }}" `
            -kvc "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_CERT_NAME }}" `
            -tr "${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_TIMESTAMP_URL }}" `
            -td sha256 `
            -v `
            ".\\${{ env.OUTPUT_NAME }}"

      - name: Verify signature
        if: ${{ inputs.sign && contains(inputs.os, 'windows') && !github.event.pull_request }}
        shell: pwsh
        run: |
          Get-AuthenticodeSignature ".\\${{ env.OUTPUT_NAME }}" | Format-List

      - name: Build for Non-Windows
        if: ${{ !contains(inputs.os, 'windows') }}
        shell: bash
        env:
          BUILD_TAGS: ${{ env.BUILD_TAGS }}
          OUTPUT_NAME_PREFIX: ${{ env.OUTPUT_NAME_PREFIX }}
        run: |
          export GOOS=$(echo ${{ inputs.os }} | cut -d'-' -f1)
          export GOARCH=$(echo ${{ inputs.os }} | cut -d'-' -f2)
          export OUTPUT_NAME="${OUTPUT_NAME_PREFIX}${GOOS}_${GOARCH}"
          export CGO_ENABLED=1

          echo "Building with tags: ${BUILD_TAGS}"
          echo "Output file: ${OUTPUT_NAME}"

          if [[ "${{ inputs.os }}" == linux-amd64 ]]; then
            MANYLINUX_IMAGE=quay.io/pypa/manylinux2014_x86_64
          elif [[ "${{ inputs.os }}" == linux-arm64 ]]; then
            MANYLINUX_IMAGE=quay.io/pypa/manylinux2014_aarch64
          fi

          if [[ "${{ inputs.os }}" == linux-* ]]; then
            bash .github/scripts/build-linux-manylinux.sh \
              "${MANYLINUX_IMAGE}" \
              "${OUTPUT_NAME}" \
              "${BUILD_TAGS}" \
              "${{ env.YAK_TAG }}"
          else
            go build -tags "${BUILD_TAGS}" -ldflags "-s -w -X 'main.goVersion=$(go version)' -X 'main.gitHash=$(git show -s --format=%H)' -X 'main.buildTime=$(git show -s --format=%cd)' -X 'main.yakVersion=${{ env.YAK_TAG }}'" -o $OUTPUT_NAME -v common/yak/cmd/yak.go
          fi
          ls -lh "$OUTPUT_NAME"

          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Verify glibc baseline (Linux, manylinux2014)
        if: startsWith(inputs.os, 'linux')
        run: bash .github/scripts/verify-glibc-baseline.sh "./${{ env.OUTPUT_NAME }}"

      - name: Generate Checksums
        shell: bash
        run: |
          if [ -z "${YAK:-}" ] || [ ! -f "$YAK" ]; then
            echo "::error::YAK operator binary missing; OSS download step must succeed"
            exit 1
          fi
          "$YAK" sha256 -f ${{ env.OUTPUT_NAME }}
          echo "SHA256=${{ env.OUTPUT_NAME }}.sha256.txt" >> "$GITHUB_ENV"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}
          path: ./${{ env.OUTPUT_NAME }}

      - name: Upload sha256 checksums artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SHA256 }}
          path: ./${{ env.SHA256 }}
