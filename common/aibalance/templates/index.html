<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBALANCE</title>
    <link rel="stylesheet" href="/public/static/dashboard.css">
</head>
<body>

    <!-- Hero Banner -->
    <section class="hero">
        <div class="hero-bg">
            <img src="/public/static/header-bg.png" alt="" loading="eager" fetchpriority="high" decoding="async">
        </div>

        <!-- Top bar (overlaid on hero) -->
        <div class="top-bar">
            <div class="top-bar-left">
                <span class="logo">AIBALANCE</span>
            </div>
            <div class="top-bar-right">
                <span class="refresh-indicator">
                    <span class="refresh-dot" id="refresh-dot"></span>
                    <span>Live</span>
                </span>
                <button class="theme-toggle" id="theme-toggle" type="button">&#9790; Dark</button>
            </div>
        </div>

        <div class="hero-content">
            <h1 class="hero-title">AIBALANCE</h1>
            <p class="hero-subtitle">AI Gateway &amp; Load Balancer</p>
            <div class="hero-status">
                <span class="hero-status-dot"></span>
                <span id="hero-status-text">Connecting...</span>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="kpi-card" id="kpi-requests">
                <div class="kpi-label"><span class="kpi-icon">&#9776;</span> Total Requests</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
            </div>

            <div class="kpi-card" id="kpi-success">
                <div class="kpi-label"><span class="kpi-icon">&#10003;</span> Success Rate</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
                <div class="health-bar"><div class="health-bar-fill good" style="width:0%"></div></div>
            </div>

            <div class="kpi-card" id="kpi-providers">
                <div class="kpi-label"><span class="kpi-icon">&#9679;</span> Providers</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
                <div class="health-bar"><div class="health-bar-fill good" style="width:0%"></div></div>
            </div>

            <div class="kpi-card" id="kpi-traffic">
                <div class="kpi-label"><span class="kpi-icon">&#8693;</span> Traffic</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
            </div>

            <div class="kpi-card" id="kpi-concurrent">
                <div class="kpi-label"><span class="kpi-icon">&#9889;</span> Concurrent</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
            </div>

            <div class="kpi-card" id="kpi-memory">
                <div class="kpi-label"><span class="kpi-icon">&#9618;</span> Memory</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
            </div>

            <div class="kpi-card hidden" id="kpi-websearch">
                <div class="kpi-label"><span class="kpi-icon">&#128269;</span> Web Search</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
            </div>

            <div class="kpi-card hidden" id="kpi-amap">
                <div class="kpi-label"><span class="kpi-icon">&#127759;</span> Amap</div>
                <div class="kpi-value">-</div>
                <div class="kpi-sub">&nbsp;</div>
            </div>
        </div>

        <!-- Models Section -->
        <div class="section">
            <div class="section-title">&#9670; Available Models</div>
            <div class="model-grid" id="model-list">
                <div class="skeleton skeleton-model"></div>
                <div class="skeleton skeleton-model"></div>
                <div class="skeleton skeleton-model"></div>
            </div>
        </div>

        <!-- Uptime Section -->
        <div class="section" id="uptime-section" style="display:none">
            <div class="section-title">&#9650; Uptime (24h)</div>
            <div class="uptime-list" id="uptime-list">
                <div class="empty-state">No uptime data yet</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span class="footer-time" id="footer-time">Loading...</span>
        </div>
    </main>

    <!-- Portal Login Link (bottom-right) -->
    <div class="portal-link-wrap">
        <a class="portal-link" href="/portal/login">
            <span>&#8594;</span>
            <span>Admin Portal</span>
        </a>
    </div>

    <script src="/public/static/dashboard.js"></script>
</body>
</html>
