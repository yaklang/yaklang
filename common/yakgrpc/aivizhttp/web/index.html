<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__VIZ_TITLE__</title>
<style>
/* ── Color tokens (from kimi-code vis theme.css) ────────────── */
:root{
  --surface-0:#0b0d12;--surface-1:#13161d;--surface-2:#1a1e28;--surface-3:#242936;
  --border:#2a3040;--border-2:#1f2433;
  --fg-0:#e4e7ef;--fg-1:#b4bccd;--fg-2:#6b7388;--fg-3:#454c5e;
  --color-on-accent:#0b0d12;
  --color-cat-conversation:#22d3ee;--color-cat-config:#a78bfa;--color-cat-lifecycle:#94a3b8;
  --color-cat-subagent:#8b5cf6;--color-cat-approval:#fb923c;--color-cat-ephemeral:#facc15;
  --color-cat-meta:#6366f1;--color-cat-tools:#f59e0b;
  --color-user:#38bdf8;--color-assistant:#22d3ee;--color-tool:#f59e0b;
  --color-compaction:#f97316;--color-turn:#14b8a6;
  --color-sev-info:#60a5fa;--color-sev-success:#4ade80;--color-sev-warning:#fbbf24;--color-sev-error:#f87171;
}
[data-theme="light"]{
  --surface-0:#ffffff;--surface-1:#f6f8fa;--surface-2:#eaeef2;--surface-3:#d8dee5;
  --border:#d0d7de;--border-2:#e3e8ee;
  --fg-0:#1f2328;--fg-1:#3d444d;--fg-2:#656d76;--fg-3:#8c959f;
  --color-on-accent:#ffffff;
  --color-cat-conversation:#0969da;--color-cat-config:#8250df;--color-cat-lifecycle:#57606a;
  --color-cat-subagent:#8250df;--color-cat-approval:#bc4c00;--color-cat-ephemeral:#9a6700;
  --color-cat-meta:#6660df;--color-cat-tools:#bc4c00;
  --color-user:#0969da;--color-assistant:#0969da;--color-tool:#bc4c00;
  --color-compaction:#bc4c00;--color-turn:#0a7b83;
  --color-sev-info:#0969da;--color-sev-success:#1a7f37;--color-sev-warning:#9a6700;--color-sev-error:#cf222e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--surface-0);color:var(--fg-0);font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--fg-3)}

/* ── Pill (badge) ───────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;padding:1px 6px;font-family:monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.02em;border-radius:2px;white-space:nowrap;gap:3px}
.pill-soft{background:color-mix(in oklab,var(--tone,#888) 18%,transparent);color:var(--tone,#888)}
.pill-solid{background:var(--tone,#888);color:var(--color-on-accent)}
.pill-outline{border:1px solid var(--tone,#888);color:var(--tone,#888)}

/* ── Layout ─────────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh}
.app-header{display:flex;align-items:center;height:40px;padding:0 12px;background:var(--surface-1);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0}
.app-header .logo{font-weight:700;font-size:14px;letter-spacing:-.02em}
.app-header .logo-dot{display:inline-grid;grid-template-columns:1fr 1fr;gap:1px;width:12px;height:12px;margin-right:4px}
.app-header .logo-dot span{border-radius:1px}
.app-header .subtitle{font-size:11px;color:var(--fg-3);font-family:monospace}
.app-header .spacer{flex:1}
.app-header button{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-1);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px}
.app-header button:hover{background:var(--surface-3)}
.app-body{display:flex;flex:1;min-height:0}

/* ── Session rail (left sidebar) ────────────────────────────── */
.session-rail{width:300px;flex-shrink:0;background:var(--surface-1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rail-toolbar{padding:8px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border)}
.rail-search{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-0);border-radius:4px;padding:4px 8px;font-size:12px;width:100%}
.rail-search:focus{outline:none;border-color:var(--color-cat-conversation)}
.rail-filters{display:flex;gap:4px}
.rail-filters select{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-1);border-radius:4px;padding:2px 4px;font-size:11px;flex:1}
.rail-count{font-size:11px;color:var(--fg-3);font-family:monospace}
.rail-list{flex:1;overflow-y:auto;padding:4px}
.session-card{padding:6px 8px;border-radius:4px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
.session-card:hover{background:var(--surface-2)}
.session-card.active{background:var(--surface-2);border-color:var(--color-cat-conversation)}
.session-card .sc-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-card .sc-meta{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--fg-3);margin-top:2px;font-family:monospace}
.session-card .sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.session-card .sc-prompt{font-size:11px;color:var(--fg-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}

/* ── Main content ───────────────────────────────────────────── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.main-empty{display:flex;align-items:center;justify-content:center;flex:1;color:var(--fg-3);font-size:14px;flex-direction:column;gap:8px}
.detail-header{padding:8px 12px;background:var(--surface-1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.detail-header h2{font-size:14px;font-weight:600;font-family:monospace}
.detail-header .meta-row{font-size:11px;color:var(--fg-3);display:flex;gap:12px;flex-wrap:wrap}
.tab-bar{display:flex;gap:0;background:var(--surface-1);border-bottom:1px solid var(--border);padding:0 12px;flex-shrink:0}
.tab{padding:6px 12px;cursor:pointer;color:var(--fg-2);font-family:monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid transparent}
.tab:hover{color:var(--fg-1)}
.tab.active{color:var(--fg-0);border-bottom-color:var(--color-cat-conversation)}
.tab .tab-count{font-size:10px;color:var(--fg-3);margin-left:2px}
.tab-content{flex:1;overflow-y:auto;padding:12px}

/* ── Wire (event stream) ────────────────────────────────────── */
.wire-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.wire-toolbar input{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-0);border-radius:4px;padding:4px 8px;font-size:12px}
.wire-toolbar input:focus{outline:none;border-color:var(--color-cat-conversation)}
.wire-toolbar select{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-1);border-radius:4px;padding:3px 6px;font-size:11px}
.wire-toolbar .count{font-size:11px;color:var(--fg-3);font-family:monospace;margin-left:auto}
.wire-toolbar button{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-1);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px}
.wire-toolbar button:hover{background:var(--surface-3)}
.wire-toolbar .issue-btn{cursor:pointer}
.wire-list{display:flex;flex-direction:column}
.wire-row{display:flex;align-items:center;gap:6px;padding:3px 8px;border-bottom:1px solid var(--border-2);cursor:pointer;min-height:28px;font-size:12px}
.wire-row:hover{background:var(--surface-1)}
.wire-row.expanded{background:var(--surface-1)}
.wire-row.paired-highlight{background:color-mix(in oklab,var(--color-cat-tools) 12%,transparent)}
.wire-row .ln{width:42px;text-align:right;font-family:monospace;font-size:10px;color:var(--fg-3);flex-shrink:0}
.wire-row .ts{width:60px;font-family:monospace;font-size:10px;color:var(--fg-3);flex-shrink:0}
.wire-row .headline{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.wire-row .headline-right{font-size:11px;color:var(--fg-3);flex-shrink:0;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wire-row .pair-ind{font-family:monospace;font-size:10px;color:var(--color-cat-tools);cursor:pointer;flex-shrink:0}
.wire-row .pair-ind.orphan{color:var(--color-sev-error)}
.wire-row .chev{color:var(--fg-3);flex-shrink:0;font-size:10px;transition:transform .15s}
.wire-row.expanded .chev{transform:rotate(90deg)}
.wire-detail{padding:8px 12px 8px 56px;background:var(--surface-1);border-bottom:1px solid var(--border)}
.wire-detail pre{font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;color:var(--fg-1);max-height:300px;overflow-y:auto;background:var(--surface-0);padding:6px 8px;border-radius:4px;border:1px solid var(--border)}
.wire-detail .detail-actions{display:flex;gap:6px;margin-bottom:6px}
.wire-detail .detail-actions button{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-2);border-radius:3px;padding:2px 6px;cursor:pointer;font-size:10px;font-family:monospace}
.wire-detail .detail-actions button:hover{background:var(--surface-3)}

/* ── Issues drawer ──────────────────────────────────────────── */
.issues-backdrop{position:fixed;inset:0;z-index:10;background:rgba(0,0,0,.3)}
.issues-drawer{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--surface-1);border-left:1px solid var(--border);z-index:20;display:flex;flex-direction:column}
.issues-drawer .drawer-header{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.issues-drawer .drawer-header h3{font-size:13px;font-weight:600}
.issues-drawer .drawer-header .close{margin-left:auto;cursor:pointer;color:var(--fg-3);background:none;border:none;font-size:16px}
.issues-drawer .drawer-body{flex:1;overflow-y:auto;padding:4px 0}
.issue-item{padding:6px 12px;display:flex;align-items:flex-start;gap:6px;border-bottom:1px solid var(--border-2)}
.issue-item .issue-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.issue-item .issue-text{font-size:12px;flex:1}
.issue-item .issue-kind{font-weight:600;font-family:monospace;font-size:11px}
.issue-item .issue-line{font-size:10px;color:var(--fg-3);font-family:monospace}
.issue-item .issue-jump{font-size:10px;color:var(--color-cat-conversation);cursor:pointer;background:none;border:none}
.issue-item .issue-jump:disabled{color:var(--fg-3);cursor:default}

/* ── Timeline ───────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:var(--surface-1);border:1px solid var(--border);border-radius:4px;padding:8px}
.stat-card .label{font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em}
.stat-card .value{font-size:18px;font-weight:700;margin-top:2px}
.stat-card .value.err{color:var(--color-sev-error)}
.stat-card .value.warn{color:var(--color-sev-warning)}
.sparkline{margin-bottom:16px}
.sparkline svg{width:100%;max-width:600px;height:44px}
.turn-card{background:var(--surface-1);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;overflow:hidden}
.turn-card .turn-header{padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px}
.turn-card .turn-header:hover{background:var(--surface-2)}
.turn-card .turn-body{padding:4px 10px 8px;border-top:1px solid var(--border-2)}
.step-row{padding:4px 8px;border-left:2px solid var(--border);margin:2px 0 2px 8px;font-size:11px}
.step-row.err{border-left-color:var(--color-sev-error)}
.step-row .step-meta{color:var(--fg-3);font-family:monospace;font-size:10px}
.step-bar{height:3px;background:var(--color-cat-conversation);border-radius:1px;margin:2px 0;min-width:2px}
.tool-row{padding:2px 8px 2px 20px;font-size:11px;border-left:2px solid var(--color-cat-tools);margin:2px 0 2px 16px}
.tool-row .tool-name{color:var(--color-cat-tools);font-weight:600}
.tool-row .tool-meta{color:var(--fg-3);font-family:monospace;font-size:10px}

/* ── Tool calls table ──────────────────────────────────────── */
.tools-table{width:100%;border-collapse:collapse;font-size:12px}
.tools-table th{text-align:left;padding:6px 8px;background:var(--surface-1);border-bottom:1px solid var(--border);color:var(--fg-3);font-weight:600;font-size:10px;text-transform:uppercase;position:sticky;top:0}
.tools-table td{padding:5px 8px;border-bottom:1px solid var(--border-2);vertical-align:top}
.tools-table tr:hover td{background:var(--surface-1)}
.tools-table .tool-name{color:var(--color-cat-tools);font-weight:600}
.tools-table .mono{font-family:monospace;font-size:10px}
.tools-table .truncate-cell{max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.tools-table .truncate-cell:hover{white-space:normal;overflow:visible}

/* ── Stats ─────────────────────────────────────────────────── */
.model-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.model-table th{text-align:left;padding:6px 8px;background:var(--surface-1);border-bottom:1px solid var(--border);color:var(--fg-3);font-size:10px;text-transform:uppercase}
.model-table td{padding:5px 8px;border-bottom:1px solid var(--border-2)}

/* ── Misc ───────────────────────────────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--fg-3)}
.empty .icon{font-size:48px;opacity:.2;margin-bottom:8px}
.live-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:monospace;padding:1px 6px;border-radius:3px;background:color-mix(in oklab,var(--color-sev-success) 18%,transparent);color:var(--color-sev-success)}
.live-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--color-sev-success);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sse-badge{font-size:10px;font-family:monospace;padding:1px 6px;border-radius:3px;display:inline-flex;align-items:center;gap:3px}
.sse-badge.live{background:color-mix(in oklab,var(--color-sev-success) 18%,transparent);color:var(--color-sev-success)}
.sse-badge.ended{background:color-mix(in oklab,var(--color-fg-3) 18%,transparent);color:var(--fg-3)}
.sse-badge.offline{background:color-mix(in oklab,var(--color-fg-3) 18%,transparent);color:var(--fg-3)}
.sse-badge .dot{width:6px;height:6px;border-radius:50%}
.sse-badge.live .dot{background:var(--color-sev-success);animation:pulse 1.5s infinite}
.sse-badge.ended .dot,.sse-badge.offline .dot{background:var(--fg-3)}
.load-more{text-align:center;padding:12px}
.load-more button{background:var(--surface-2);border:1px solid var(--border);color:var(--fg-1);border-radius:4px;padding:4px 16px;cursor:pointer;font-size:11px}
.load-more button:hover{background:var(--surface-3)}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <span class="logo-dot"><span style="background:var(--color-cat-conversation)"></span><span style="background:var(--color-cat-subagent)"></span><span style="background:var(--color-cat-ephemeral)"></span><span style="background:var(--color-cat-approval)"></span></span>
    <span class="logo">yak viz</span>
    <span class="subtitle">agent monitor</span>
    <span class="spacer"></span>
    <span id="liveCount"></span>
    <button id="themeBtn">Moon</button>
    <button id="refreshBtn">↻</button>
  </div>
  <div class="app-body">
    <div class="session-rail" id="sessionRail"></div>
    <div class="main" id="mainContent">
      <div class="main-empty"><div class="icon">List</div>Select a session to inspect</div>
    </div>
  </div>
</div>

<script>
"use strict";
(function(){
  // ── Config ──────────────────────────────────────────────────
  var PREFIX = "__VIZ_ROUTE_PREFIX__";
  if(PREFIX.indexOf("__")===0 && PREFIX.indexOf("VIZ_")>0){PREFIX="/api/viz"}
  var API = window.location.origin + PREFIX;

  // ── State ────────────────────────────────────────────────────
  var state = {
    currentSession: null,
    currentTab: "wire",
    sessions: [],
    railSearch: "",
    railSort: "recent",
    wireData: [],
    wireFiltered: [],
    wireSearch: "",
    wireTypeFilter: "",
    wireExpanded: new Set(),
    wirePairMap: new Map(),
    wirePairByLine: new Map(),
    wireIssues: [],
    wireHoveredPair: null,
    wireSSE: null,
    wireSSEStatus: "offline",
    timelineData: null,
    toolsData: [],
    statsData: null,
    trajectoryData: null,
    contextData: null,
    // Track which session each cache belongs to so switching sessions invalidates.
    cachedSession: null,
    liveSessions: [],
  };

  // ── DOM ──────────────────────────────────────────────────────
  var rail = document.getElementById("sessionRail");
  var main = document.getElementById("mainContent");
  var themeBtn = document.getElementById("themeBtn");
  var refreshBtn = document.getElementById("refreshBtn");

  // ── Theme (3-state: auto → light → dark → auto) ──────────────
  var theme = localStorage.getItem("viz.theme") || "light";
  document.documentElement.setAttribute("data-theme", theme);
  themeBtn.textContent = theme==="dark"?"Sun️":theme==="light"?"Half":"Moon";
  themeBtn.onclick = function(){
    theme = theme==="auto"?"light":theme==="light"?"dark":"auto";
    var effective = theme;
    if(theme==="auto"){effective = window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"}
    document.documentElement.setAttribute("data-theme", effective);
    localStorage.setItem("viz.theme", theme);
    themeBtn.textContent = theme==="dark"?"Sun️":theme==="light"?"Half":"Moon";
  };

  // ── API helper ───────────────────────────────────────────────
  function apiGet(path){
    return fetch(API+path,{headers:{"accept":"application/json"}}).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    });
  }

  // ── Time/format utils (from kimi vis util/time.ts) ───────────
  function fmtRelative(ms){
    if(!ms) return "just now";
    var d = Date.now()-ms; if(d<0) d=0;
    if(d<60000) return Math.floor(d/1000)+"s ago";
    if(d<3600000) return Math.floor(d/60000)+"m ago";
    if(d<86400000) return Math.floor(d/3600000)+"h ago";
    if(d<2592000000) return Math.floor(d/86400000)+"d ago";
    return Math.floor(d/2592000000)+"mo ago";
  }
  function fmtAbsolute(ms){
    if(!ms) return "";
    var d = new Date(ms);
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
  }
  function fmtWallClock(ms){
    if(!ms) return "--:--:--";
    var d = new Date(ms);
    return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
  }
  function fmtDuration(ms){
    if(ms==null||ms===0) return "-";
    if(ms<1000) return ms+"ms";
    if(ms<60000) return (ms/1000).toFixed(1)+"s";
    return Math.floor(ms/60000)+"m"+pad(Math.floor((ms%60000)/1000))+"s";
  }
  function fmtTokens(n){
    if(n==null) return "0";
    if(n<1000) return String(n);
    if(n<1000000) return (n/1000).toFixed(1)+"k";
    return (n/1000000).toFixed(2)+"M";
  }
  function fmtBytes(n){
    if(n==null||n===0) return "0B";
    if(n<1024) return n+"B";
    if(n<1048576) return (n/1024).toFixed(1)+"KB";
    return (n/1048576).toFixed(2)+"MB";
  }
  function pad(n){return n<10?"0"+n:String(n)}
  function truncate(s,n){if(!s)return"";return s.length<=n?s:s.substring(0,n)+"…"}
  function escapeHTML(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
  function tryPrettyJSON(s){
    if(!s) return "";
    try{var o=JSON.parse(s);return JSON.stringify(o,null,2)}catch(e){return s}
  }

  // ── Pill helper ──────────────────────────────────────────────
  function pill(tone, label, variant){
    variant = variant || "soft";
    return '<span class="pill pill-'+variant+'" style="--tone:var(--color-'+tone+')">'+escapeHTML(label)+'</span>';
  }

  // ── Event type → (tone, label) registry ─────────────────────
  // Adapted from kimi-code vis WIRE_RENDERERS, mapped to yaklang event types
  var TYPE_REGISTRY = {
    // Reasoning
    "thought":          {tone:"cat-conversation", label:"thought"},
    "action":           {tone:"cat-conversation", label:"action"},
    "observation":      {tone:"cat-conversation", label:"observe"},
    "iteration":        {tone:"cat-lifecycle", label:"iter"},
    "result":           {tone:"cat-lifecycle", label:"result"},
    // Streaming
    "stream":           {tone:"cat-ephemeral", label:"stream"},
    "stream_start":     {tone:"cat-ephemeral", label:"stream↻"},
    "structured":       {tone:"cat-meta", label:"struct"},
    // Tool calls
    "tool_call_start":  {tone:"cat-tools", label:"tool↻"},
    "tool_call_status": {tone:"cat-tools", label:"tool·"},
    "tool_call_done":   {tone:"cat-tools", label:"toolOK"},
    "tool_call_error":  {tone:"cat-tools", label:"toolNO"},
    "tool_call_result": {tone:"cat-tools", label:"result"},
    "tool_call_param":  {tone:"cat-tools", label:"params"},
    "tool_call_summary":{tone:"cat-tools", label:"summary"},
    "tool_call_reason": {tone:"cat-tools", label:"reason"},

  // ── Tool call pairing (from kimi vis computePairMap) ────────
  function computePairMap(events){
    var pairMap = new Map(); // callToolId → {callId, resultId, callTime, resultTime}
    for(var i=0;i<events.length;i++){
      var e = events[i];
      if(!e.call_tool_id) continue;
      var p = pairMap.get(e.call_tool_id);
      if(!p){p={callId:null,resultId:null,callTime:null,resultTime:null};pairMap.set(e.call_tool_id,p)}
      if(e.type==="tool_call_start"||e.type==="tool_call_status"){
        if(!p.callId){p.callId=e.id; p.callTime=e.timestamp}
      }
      if(e.type==="tool_call_done"||e.type==="tool_call_error"||e.type==="tool_call_result"||e.type==="tool_call_user_cancel"){
        if(!p.resultId){p.resultId=e.id; p.resultTime=e.timestamp}
      }
    }
    // Build lineNo → pairHint map
    var pairByLine = new Map();
    pairMap.forEach(function(p, tid){
      if(p.callId!=null){
        pairByLine.set(p.callId, {toolCallId:tid, kind:"call", targetId:p.resultId, callTime:p.callTime, resultTime:p.resultTime, durationMs:(p.resultTime&&p.callTime)?(p.resultTime-p.callTime):null});
      }
      if(p.resultId!=null){
        pairByLine.set(p.resultId, {toolCallId:tid, kind:"result", targetId:p.callId, callTime:p.callTime, resultTime:p.resultTime, durationMs:(p.resultTime&&p.callTime)?(p.resultTime-p.callTime):null});
      }
    });
    return {pairMap:pairMap, pairByLine:pairByLine};
  }

  // ── Issues detection (from kimi vis issues.ts) ──────────────
  function computeIssues(events){
    var issues = [];
    var toolCallById = new Map(); // callToolId → {lineNo, hasResult}
    for(var i=0;i<events.length;i++){
      var e = events[i];
      if(!e.call_tool_id) continue;
      if(e.type==="tool_call_start"){
        toolCallById.set(e.call_tool_id, {lineNo:e.id, hasResult:false, isError:false});
      }
      if(e.type==="tool_call_error"){
        var tc = toolCallById.get(e.call_tool_id);
        if(tc){tc.hasResult=true; tc.isError=true}
        issues.push({severity:"error", kind:"tool_error", lineNo:e.id, summary:"Tool call error: "+(e.content||"unknown"), detail:e.content});
      }
      if(e.type==="tool_call_result"){
        var tc2 = toolCallById.get(e.call_tool_id);
        if(tc2){tc2.hasResult=true}
      }
      if(e.type==="tool_call_user_cancel"){
        var tc3 = toolCallById.get(e.call_tool_id);
        if(tc3){tc3.hasResult=true}
        issues.push({severity:"warning", kind:"tool_cancelled", lineNo:e.id, summary:"Tool call cancelled by user"});
      }
    }
    // Orphan tool calls (started but never completed)
    toolCallById.forEach(function(tc, tid){
      if(!tc.hasResult){
        issues.push({severity:"warning", kind:"orphan_tool_call", lineNo:tc.lineNo, summary:"Tool call started but never completed (id: "+truncate(tid,12)+")"});
      }
    });
    // Sort: error > warning > info, then by lineNo
    var sevOrder = {error:0, warning:1, info:2};
    issues.sort(function(a,b){
      if(sevOrder[a.severity]!==sevOrder[b.severity]) return sevOrder[a.severity]-sevOrder[b.severity];
      return (a.lineNo||Infinity)-(b.lineNo||Infinity);
    });
    return issues;
  }
  var SEV_COLOR = {error:"var(--color-sev-error)", warning:"var(--color-sev-warning)", info:"var(--color-sev-info)"};
  var KIND_LABEL = {
    tool_error:"tool error", orphan_tool_call:"orphan tool call", tool_cancelled:"tool cancelled",
  };
  function topSeverity(issues){
    for(var i=0;i<issues.length;i++){if(issues[i].severity==="error")return"error"}
    for(var i=0;i<issues.length;i++){if(issues[i].severity==="warning")return"warning"}
    for(var i=0;i<issues.length;i++){if(issues[i].severity==="info")return"info"}
    return null;
  }

  // ── Timeline analysis (from kimi vis analysis.ts) ───────────
  function analyzeTimeline(events){
    var turns = [];
    var currentTurn = null;
    var toolStats = new Map(); // name → {count, errorCount, totalMs, maxMs}
    var totalTokens = {input:0, output:0};
    var peakContext = 0;
    var firstTime = null, lastTime = null;
    var toolCallById = new Map();

    for(var i=0;i<events.length;i++){
      var e = events[i];
      var t = e.timestamp ? (e.timestamp>1e12 ? e.timestamp : e.timestamp*1000) : null;
      if(t){if(!firstTime)firstTime=t; lastTime=t}

      // Turn boundaries: input events start a new turn
      if(e.type==="input"){
        if(currentTurn){turns.push(currentTurn)}
        currentTurn = {index:turns.length, trigger:"input", startTime:t, endTime:t, steps:[], toolCalls:0, toolErrors:0, tokens:{input:0,output:0}};
      }
      // Start plan → new turn
      if(e.type==="start_plan_and_execution"){
        if(currentTurn){turns.push(currentTurn)}
        currentTurn = {index:turns.length, trigger:"plan", startTime:t, endTime:t, steps:[], toolCalls:0, toolErrors:0, tokens:{input:0,output:0}};
      }
      // Tool calls
      if(e.type==="tool_call_start" && e.call_tool_id){
        toolCallById.set(e.call_tool_id, {callTime:t, callLineNo:e.id, name:extractField(e.content,"tool_name")||extractField(e.content,"name")||"unknown"});
        if(currentTurn) currentTurn.toolCalls++;
      }
      if((e.type==="tool_call_done"||e.type==="tool_call_error"||e.type==="tool_call_result") && e.call_tool_id){
        var tc = toolCallById.get(e.call_tool_id);
        if(tc){
          tc.resultTime = t;
          tc.durationMs = (t&&tc.callTime)?(t-tc.callTime):null;
          tc.isError = e.type==="tool_call_error";
          if(tc.isError && currentTurn) currentTurn.toolErrors++;
          // Record tool stat
          var ts = toolStats.get(tc.name) || {count:0, errorCount:0, totalMs:0, maxMs:0};
          ts.count++;
          if(tc.isError) ts.errorCount++;
          if(tc.durationMs){ts.totalMs+=tc.durationMs; if(tc.durationMs>ts.maxMs)ts.maxMs=tc.durationMs}
          toolStats.set(tc.name, ts);
        }
      }
      // Token consumption
      if(e.type==="consumption" && e.content){
        var inp = extractNum(e.content,"input_tokens")||extractNum(e.content,"input");
        var out = extractNum(e.content,"output_tokens")||extractNum(e.content,"output");
        totalTokens.input += inp;
        totalTokens.output += out;
        if(currentTurn){currentTurn.tokens.input+=inp; currentTurn.tokens.output+=out}
      }
      // Context pressure
      if(e.type==="pressure" && e.content){
        var p = extractNum(e.content,"pressure")||extractNum(e.content,"percent");
        if(p && p>peakContext) peakContext = p;
      }
      // Update turn end time
      if(currentTurn && t) currentTurn.endTime = t;
    }
    if(currentTurn) turns.push(currentTurn);

    // Build tool stats array
    var toolStatsArr = [];
    toolStats.forEach(function(ts, name){
      ts.name = name; ts.avgMs = ts.count>0?Math.round(ts.totalMs/ts.count):0;
      toolStatsArr.push(ts);
    });
    toolStatsArr.sort(function(a,b){return b.count-a.count});

    return {
      turns: turns,
      toolStats: toolStatsArr,
      totalTokens: totalTokens,
      peakContext: peakContext,
      wallClockMs: (firstTime&&lastTime)?(lastTime-firstTime):0,
      turnCount: turns.length,
      stepCount: turns.reduce(function(s,t){return s+t.steps.length},0),
      toolCallCount: turns.reduce(function(s,t){return s+t.toolCalls},0),
      toolErrorCount: turns.reduce(function(s,t){return s+t.toolErrors},0),
    };
  }
  function extractField(content, field){
    if(!content) return "";
    try{var j=JSON.parse(content); return j[field]||""}catch(e){return ""}
  }
  function extractNum(content, field){
    if(!content) return 0;
    try{var j=JSON.parse(content); var v=j[field]; if(typeof v==="number")return v; if(typeof v==="string")return parseInt(v)||0; return 0}catch(e){return 0}
  }
