    var url = "/sessions/"+encodeURIComponent(state.currentSession)+"/events?page="+state.wirePage+"&limit=100";
    if(state.wireTypeFilter) url += "&type="+state.wireTypeFilter;
    apiGet(url).then(function(resp){
      state.wireData = state.wireData.concat(resp.events || []);
      state.wireHasMore = resp.has_more;
      // Recompute pairs and issues
      var pairs = computePairMap(state.wireData);
      state.wirePairMap = pairs.pairMap;
      state.wirePairByLine = pairs.pairByLine;
      state.wireIssues = computeIssues(state.wireData);
      applyWireFilter();
      renderWireList();
      updateIssueBtn();
      // Auto-connect SSE if session is alive
      apiGet("/sessions/"+encodeURIComponent(state.currentSession)).then(function(d){
        if(d.is_alive && !state.wireSSE){startLiveSSE()}
      });
    });
  }

  function loadMoreEvents(){
    state.wirePage++;
    loadEvents();
  }

  function applyWireFilter(){
    var q = state.wireSearch.toLowerCase().trim();
    state.wireFiltered = state.wireData.filter(function(e){
      if(state.wireTypeFilter && e.type!==state.wireTypeFilter) return false;
      if(!q) return true;
      return e.type.toLowerCase().includes(q) || (e.content||"").toLowerCase().includes(q) || (e.stream_delta||"").toLowerCase().includes(q);
    });
  }

  function renderWireList(){
    var list = document.getElementById("wireList");
    var countEl = document.getElementById("wireCount");
    if(countEl) countEl.textContent = state.wireFiltered.length+" / "+state.wireData.length+" ev";
    var loadMore = document.getElementById("wireLoadMore");
    if(loadMore) loadMore.style.display = state.wireHasMore ? "block" : "none";

    if(state.wireFiltered.length===0){
      list.innerHTML = '<div class="empty"><div class="icon">Inbox</div>No events'+(state.wireData.length===0?"":" matching filter")+'</div>';
      return;
    }
    list.innerHTML = state.wireFiltered.map(function(e){
      var expanded = state.wireExpanded.has(e.id);
      var pair = state.wirePairByLine.get(e.id);
      var pairHTML = "";
      if(pair){
        var orphan = pair.targetId==null;
        var arrow = pair.kind==="call"?"→":"←";
        var target = pair.targetId!=null?"#"+pair.targetId:"?";
        pairHTML = '<span class="pair-ind'+(orphan?" orphan":"")+'" data-jump="'+(pair.targetId||"")+'">'+arrow+' '+target+'</span>';
        if(pair.durationMs!=null) pairHTML += '<span class="pair-ind">'+fmtDuration(pair.durationMs)+'</span>';
      }
      var ts = e.timestamp ? (e.timestamp>1e12 ? e.timestamp : e.timestamp*1000) : null;
      var detail = expanded ? '<div class="wire-detail">'+
        '<div class="detail-actions">'+
          '<button data-copy="'+escapeHTML(e.content||e.stream_delta||"")+'">copy</button>'+
        '</div>'+
        '<pre>'+escapeHTML(tryPrettyJSON(e.content||e.stream_delta||""))+'</pre>'+
      '</div>' : "";
      return '<div class="wire-row'+(expanded?" expanded":"")+'" data-id="'+e.id+'">'+
        '<span class="ln">'+e.id+'</span>'+
        '<span class="ts">'+fmtWallClock(ts)+'</span>'+
        '<span class="headline">'+headline(e)+'</span>'+
        '<span class="headline-right">'+headlineRight(e)+'</span>'+
        pairHTML+
        '<span class="chev">▶</span>'+
      '</div>'+detail;
    }).join("");

    // Bind row clicks
    list.querySelectorAll(".wire-row").forEach(function(row){
      row.onclick = function(ev){
        if(ev.target.classList.contains("pair-ind")){
          var jumpId = parseInt(ev.target.getAttribute("data-jump"));
          if(jumpId){
            state.wireExpanded.add(jumpId);
            var idx = state.wireFiltered.findIndex(function(e){return e.id===jumpId});
            if(idx>=0){
              var rowEl = list.children[idx];
              if(rowEl) rowEl.scrollIntoView({behavior:"smooth",block:"center"});
            }
            renderWireList();
          }
          ev.stopPropagation();
          return;
        }
        var id = parseInt(row.getAttribute("data-id"));
        if(state.wireExpanded.has(id)){state.wireExpanded.delete(id)}else{state.wireExpanded.add(id)}
        renderWireList();
      };
    });
    // Bind copy buttons
    list.querySelectorAll(".detail-actions button").forEach(function(btn){
      btn.onclick = function(ev){
        ev.stopPropagation();
        navigator.clipboard.writeText(btn.getAttribute("data-copy"));
        btn.textContent = "OK copied";
        setTimeout(function(){btn.textContent="copy"},1200);
      };
    });
  }

  function updateIssueBtn(){
    var btn = document.getElementById("wireIssueBtn");
    if(!btn) return;
    if(state.wireIssues.length===0){btn.style.display="none"; return}
    var sev = topSeverity(state.wireIssues);
    var color = SEV_COLOR[sev]||"var(--fg-3)";
    btn.style.display = "inline-flex";
    btn.innerHTML = '<button class="issue-btn" style="color:'+color+';border-color:'+color+'">! '+state.wireIssues.length+' issues</button>';
    btn.querySelector("button").onclick = openIssuesDrawer;
  }

  function openIssuesDrawer(){
    var backdrop = document.createElement("div");
    backdrop.className = "issues-backdrop";
    var drawer = document.createElement("div");
    drawer.className = "issues-drawer";
    drawer.innerHTML =
      '<div class="drawer-header"><h3>Issues ('+state.wireIssues.length+')</h3><button class="close">X</button></div>'+
      '<div class="drawer-body">'+
        state.wireIssues.map(function(iss){
          var lineVisible = state.wireFiltered.findIndex(function(e){return e.id===iss.lineNo})>=0;
          return '<div class="issue-item">'+
            '<span class="issue-dot" style="background:'+SEV_COLOR[iss.severity]+'"></span>'+
            '<div class="issue-text">'+
              '<div class="issue-kind">'+escapeHTML(KIND_LABEL[iss.kind]||iss.kind)+'</div>'+
              '<div>'+escapeHTML(truncate(iss.summary,100))+'</div>'+
              '<div class="issue-line">line '+iss.lineNo+(lineVisible?"":' (filtered out)')+'</div>'+
            '</div>'+
            '<button class="issue-jump" data-line="'+iss.lineNo+'"'+(lineVisible?"":"disabled")+'>jump →</button>'+
          '</div>';
        }).join("")+
      '</div>';
    document.body.appendChild(backdrop);
    document.body.appendChild(drawer);
    var close = function(){document.body.removeChild(backdrop); document.body.removeChild(drawer)};
    drawer.querySelector(".close").onclick = close;
    backdrop.onclick = close;
    drawer.querySelectorAll(".issue-jump").forEach(function(btn){
      if(!btn.disabled){
        btn.onclick = function(){
          var lineNo = parseInt(btn.getAttribute("data-line"));
          state.wireExpanded.add(lineNo);
          var idx = state.wireFiltered.findIndex(function(e){return e.id===lineNo});
          if(idx>=0){
            var list = document.getElementById("wireList");
            if(list && list.children[idx]) list.children[idx].scrollIntoView({behavior:"smooth",block:"center"});
          }
          renderWireList();
          close();
        };
      }
    });
  }

  // ── SSE Live ────────────────────────────────────────────────
  function toggleLive(){
    if(state.wireSSE){closeSSE(); return}
    startLiveSSE();
  }
  function startLiveSSE(){
    var url = API + "/sessions/"+encodeURIComponent(state.currentSession)+"/stream";
    var es = new EventSource(url);
    state.wireSSE = es;
    es.addEventListener("system", function(ev){
      var data = JSON.parse(ev.data);
      if(data.type==="live"){updateSSEStatus("live","live")}
      else if(data.type==="ended"){updateSSEStatus("ended","ended")}
    });
    es.addEventListener("event", function(ev){
      var e = JSON.parse(ev.data);
      // Deduplicate
      if(state.wireData.findIndex(function(x){return x.id===e.id})<0){
        state.wireData.push(e);
        var pairs = computePairMap(state.wireData);
        state.wirePairMap = pairs.pairMap;
        state.wirePairByLine = pairs.pairByLine;
        state.wireIssues = computeIssues(state.wireData);
        applyWireFilter();
        renderWireList();
        updateIssueBtn();
        // Auto-scroll
        var content = document.getElementById("tabContent");
        if(content) content.scrollTop = content.scrollHeight;
      }
    });
    es.onerror = function(){updateSSEStatus("offline","offline")};
    document.getElementById("wireLive").textContent = "⏹ Stop";
  }
  function closeSSE(){
    if(state.wireSSE){state.wireSSE.close(); state.wireSSE=null}
    updateSSEStatus("offline","offline");
    var btn = document.getElementById("wireLive");
    if(btn) btn.textContent = "● Live";
  }
  function updateSSEStatus(cls, label){
    var badge = document.getElementById("sseBadge");
    if(!badge) return;
    badge.className = "sse-badge "+cls;
    document.getElementById("sseLabel").textContent = label;
  }

  // ── Context tab: project events into chat-like system/user/assistant/tool view ──
  // State for agent filter and view mode (persisted per session in memory only)
  var contextState = {
    agentFilter: "__all__", // "__all__" | "__main__" | agentKey
    viewMode: "compact",    // "compact" folds repeated thoughts; "full" keeps everything
    loopFilter: "__all__",  // "__all__" | loopName
    phaseFilter: "__all__", // "__all__" | phaseName (from trajectory node label/kind)
    showInternal: false,    // show "internal" (structural status/marker) blocks
    showTrajectory: false   // show "trajectory" (loop_marker/iteration) blocks
  };

  function renderContextTab(container){
    function renderContextData(ctx, stats){
      var blocks = ctx.blocks || [];
      if(blocks.length===0){
        container.innerHTML = '<div class="empty"><div class="icon">Chat</div>No context data.</div>';
        return;
      }
      // Backward-compatible shaping: backend projection returns plain agents/blocks.
      ctx.modelName = stats.model_breakdown && stats.model_breakdown[0] ? stats.model_breakdown[0].model : null;
      ctx.inputTokens = stats.input_tokens;
      ctx.outputTokens = stats.output_tokens;
      ctx.totalTokens = stats.total_tokens;
      ctx.contextPressure = stats.context_pressure_max;
      container.innerHTML = renderContextUI(ctx);
      bindContextToggles();
      bindContextFilters(container, ctx);
    }
    // Cache: reuse context + stats if already fetched for this session.
    if(state.contextData && state.statsData && state.cachedSession === state.currentSession){
      renderContextData(state.contextData, state.statsData);
      return;
    }
    container.innerHTML = '<div class="empty">Loading context...</div>';
    Promise.all([
      apiGet("/sessions/"+encodeURIComponent(state.currentSession)+"/context?limit=2000"),
      apiGet("/sessions/"+encodeURIComponent(state.currentSession)+"/stats"),
    ]).then(function(results){
      state.contextData = results[0] || {};
      state.statsData = results[1] || {};
      state.cachedSession = state.currentSession;
      renderContextData(state.contextData, state.statsData);
    }).catch(function(err){
      container.innerHTML = '<div class="empty">Error: '+escapeHTML(err.message)+'</div>';
    });
  }

  // Backend context projection is now used via /sessions/{id}/context.
  // This helper is kept as a thin fallback/shim for tests or manual event arrays.
  function projectContext(events){
    return {agents:[], blocks:[]};
  }

  function renderContextUI(ctx){
    var blocks = (ctx.blocks || []).map(function(b){ return normalizeProjectedBlock(b); });
    var agents = (ctx.agents || []).map(function(a){
      return {
        key: a.key,
        name: a.name,
        isSub: a.is_sub !== undefined ? a.is_sub : a.isSub,
        firstLine: a.first_line !== undefined ? a.first_line : a.firstLine
      };
    });

    // By default hide "internal" and "trajectory" blocks. These are structural
    // metadata (status events, loop_marker, timeline_item, iteration markers)
    // not conversation content; a large code_security_audit session emits
    // thousands of them, drowning the real content (user/assistant/think/
    // tool_call) and freezing the browser. Users can toggle them on.
    if(!contextState.showInternal){
      blocks = blocks.filter(function(b){ return b.type !== "internal"; });
    }
    if(!contextState.showTrajectory){
      blocks = blocks.filter(function(b){ return b.type !== "trajectory"; });
    }

    // Build loop filter options from prompt_profile blocks
    var loops = {};
    blocks.forEach(function(b){ if(b.loopName) loops[b.loopName] = true; });
    var loopNames = Object.keys(loops).sort();

    // Build phase filter options from trajectory markers / prompt_profile loop names
    var phases = {};
    blocks.forEach(function(b){
      if(b.type === "trajectory" && (b.trajectoryKind === "phase" || b.trajectoryKind === "loop_enter")){
        var label = b.content || b.loopName || "";
        if(label) phases[label] = true;
      }
      if(b.loopName) phases[b.loopName] = true;
    });
    var phaseNames = Object.keys(phases).sort();

    // Apply agent filter
    if(contextState.agentFilter !== "__all__"){
      if(contextState.agentFilter === "__main__"){
        blocks = blocks.filter(function(b){ return !b.agentKey; });
      }else{
        blocks = blocks.filter(function(b){ return b.agentKey === contextState.agentFilter; });
      }
    }

    // Apply loop filter
    if(contextState.loopFilter !== "__all__"){
      blocks = blocks.filter(function(b){ return b.loopName === contextState.loopFilter; });
    }

    // Apply phase filter: include blocks whose loopName matches the selected phase,
    // or trajectory blocks whose content/loopName matches.
    if(contextState.phaseFilter !== "__all__"){
      blocks = blocks.filter(function(b){
        if(b.loopName === contextState.phaseFilter) return true;
        if(b.type === "trajectory"){
          var label = b.content || "";
          if(label.indexOf(contextState.phaseFilter) >= 0) return true;
          if(b.loopName === contextState.phaseFilter) return true;
        }
        return false;
      });
    }

    // Compact mode: fold adjacent repeated think blocks that share the same agent and prefix
    if(contextState.viewMode === "compact"){
      blocks = compactThoughts(blocks);
    }

    var tokenSegments = "";
    if(ctx.totalTokens>0){
      var inpPct = (ctx.inputTokens/ctx.totalTokens*100).toFixed(1);
      var outPct = (ctx.outputTokens/ctx.totalTokens*100).toFixed(1);
      tokenSegments =
        '<div style="display:flex;height:3px;border-radius:2px;overflow:hidden;background:var(--border);margin-top:6px">'+
          '<div style="width:'+inpPct+'%;background:var(--color-sev-info)"></div>'+
          '<div style="width:'+outPct+'%;background:var(--color-assistant)"></div>'+
        '</div>';
    }

    // Agent filter select
    var agentOptions = '<option value="__all__"'+(contextState.agentFilter==="__all__"?" selected":"")+'>all agents</option>'+
      '<option value="__main__"'+(contextState.agentFilter==="__main__"?" selected":"")+'>main agent</option>';
    agents.forEach(function(a){
      if(!a.key) return; // main already listed
      agentOptions += '<option value="'+escapeHTML(a.key)+'"'+(contextState.agentFilter===a.key?" selected":"")+'>'+
        escapeHTML(a.name) + ' ('+escapeHTML(truncate(a.key,20))+')'+
      '</option>';
    });

    // Loop filter select
    var loopOptions = '<option value="__all__"'+(contextState.loopFilter==="__all__"?" selected":"")+'>all loops</option>';
    loopNames.forEach(function(ln){
      loopOptions += '<option value="'+escapeHTML(ln)+'"'+(contextState.loopFilter===ln?" selected":"")+'>'+escapeHTML(ln)+'</option>';
    });

    // Phase filter select
    var phaseOptions = '<option value="__all__"'+(contextState.phaseFilter==="__all__"?" selected":"")+'>all phases</option>';
    phaseNames.forEach(function(ph){
      phaseOptions += '<option value="'+escapeHTML(ph)+'"'+(contextState.phaseFilter===ph?" selected":"")+'>'+escapeHTML(truncate(ph,40))+'</option>';
    });

    var toolbar =
      '<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap">'+
        '<label style="display:flex;align-items:center;gap:6px;font-family:monospace;font-size:11px;color:var(--fg-3)">'+
          '<span>agent</span>'+
          '<select id="ctxAgentFilter" style="background:var(--surface-2);border:1px solid var(--border);color:var(--fg-0);border-radius:4px;padding:3px 6px;font-size:11px">'+
            agentOptions +
          '</select>'+
        '</label>'+
        '<label style="display:flex;align-items:center;gap:6px;font-family:monospace;font-size:11px;color:var(--fg-3)">'+
          '<span>loop</span>'+
          '<select id="ctxLoopFilter" style="background:var(--surface-2);border:1px solid var(--border);color:var(--fg-0);border-radius:4px;padding:3px 6px;font-size:11px">'+
            loopOptions +
          '</select>'+
        '</label>'+
        '<label style="display:flex;align-items:center;gap:6px;font-family:monospace;font-size:11px;color:var(--fg-3)">'+
          '<span>phase</span>'+
          '<select id="ctxPhaseFilter" style="background:var(--surface-2);border:1px solid var(--border);color:var(--fg-0);border-radius:4px;padding:3px 6px;font-size:11px">'+
            phaseOptions +
          '</select>'+
        '</label>'+
        '<label style="display:flex;align-items:center;gap:6px;font-family:monospace;font-size:11px;color:var(--fg-3)">'+
          '<span>view</span>'+
          '<select id="ctxViewMode" style="background:var(--surface-2);border:1px solid var(--border);color:var(--fg-0);border-radius:4px;padding:3px 6px;font-size:11px">'+
            '<option value="compact"'+(contextState.viewMode==="compact"?" selected":"")+'>compact</option>'+
            '<option value="full"'+(contextState.viewMode==="full"?" selected":"")+'>full</option>'+
          '</select>'+
        '</label>'+
        '<label style="display:flex;align-items:center;gap:4px;font-family:monospace;font-size:11px;color:var(--fg-3);cursor:pointer">'+
          '<input type="checkbox" id="ctxShowInternal" '+(contextState.showInternal?"checked":"")+' style="margin:0">'+
          '<span>internal</span>'+
        '</label>'+
        '<label style="display:flex;align-items:center;gap:4px;font-family:monospace;font-size:11px;color:var(--fg-3);cursor:pointer">'+
          '<input type="checkbox" id="ctxShowTrajectory" '+(contextState.showTrajectory?"checked":"")+' style="margin:0">'+
          '<span>trajectory</span>'+
        '</label>'+
        '<span style="font-family:monospace;font-size:11px;color:var(--fg-3)">'+blocks.length+' messages · '+agents.length+' agents</span>'+
        (ctx.modelName?'<span style="font-family:monospace;font-size:11px;color:var(--color-cat-config)">model '+escapeHTML(ctx.modelName)+'</span>':'')+
        (ctx.totalTokens?'<span style="font-family:monospace;font-size:11px;color:var(--fg-3)">'+fmtTokens(ctx.inputTokens)+' in · '+fmtTokens(ctx.outputTokens)+' out</span>':'')+
      '</div>'+tokenSegments;

    var html = toolbar;
    // Render blocks grouped by agent
    var lastAgentKey = null;
    for(var i=0;i<blocks.length;i++){
      var b = blocks[i];
      if(b.agentKey !== lastAgentKey){
        lastAgentKey = b.agentKey;
        var isSub = b.isSubAgent;
        var label = isSub ? "sub-agent" : "agent";
        html += '<div style="display:flex;align-items:center;gap:8px;margin:12px 0 6px;padding:4px 0;border-bottom:1px solid var(--border-2)">'+
          pill(isSub?"cat-subagent":"cat-lifecycle", label)+
          '<span style="font-size:12px;font-weight:600;color:var(--fg-1)">'+escapeHTML(b.agentName || (b.agentKey ? "agent "+truncate(b.agentKey,24) : "main agent"))+'</span>'+
          (b.agentKey?'<span style="font-family:monospace;font-size:10px;color:var(--fg-3)">'+escapeHTML(truncate(b.agentKey,24))+'</span>':'')+
        '</div>';
      }
      html += renderContextBlock(b);
    }
    return html;
  }

  function compactThoughts(blocks){
    var out = [];
    var prevThink = null;
    blocks.forEach(function(b){
      if(b.type !== "think"){
        prevThink = null;
        out.push(b);
        return;
      }
      var text = (b.content || "").trim();
      if(prevThink && prevThink.agentKey === b.agentKey){
        // If this thought is a substring/prefix of the previous one, skip it (streaming duplicate)
        var prevText = (prevThink.content || "").trim();
        if(prevText.indexOf(text) >= 0 || text.indexOf(prevText) >= 0 || similarity(text, prevText) > 0.85){
          // Keep the longer one
          if(text.length > prevText.length){
            prevThink.content = text;
            prevThink.lineNo = b.lineNo;
          }
          return;
        }
      }
      out.push(b);
      prevThink = b;
    });
    return out;
  }

  function similarity(a, b){
    if(!a || !b) return 0;
    if(a === b) return 1;
    // Simple token overlap similarity
    var sa = a.split(/\s+/).filter(function(x){return x.length>0});
    var sb = b.split(/\s+/).filter(function(x){return x.length>0});
    var map = {};
    sa.forEach(function(w){ map[w] = (map[w]||0)+1; });
    var inter = 0;
    sb.forEach(function(w){ if(map[w]>0){ inter++; map[w]--; } });
    return (2*inter) / (sa.length + sb.length);
  }

  // normalize backend-projected block to the internal shape used by renderContextBlock.
  // 同时兼容 snake_case (后端原始) 和 camelCase (已被 normalize 过的对象)，
  // 避免 renderContextUI 与 renderContextBlock 重复 normalize 时字段丢失。
  function normalizeProjectedBlock(b){
    return {
      type: b.type || b.role || "assistant",
      role: b.role || b.type || "assistant",
      agentKey: firstDefined(b.agent_key, b.agentKey),
      agentName: firstDefined(b.agent_name, b.agentName),
      isSubAgent: firstDefined(b.is_sub_agent, b.isSubAgent),
      content: b.content,
      summary: b.summary,
      toolName: firstDefined(b.tool_name, b.toolName),
      toolDesc: firstDefined(b.tool_desc, b.toolDesc),
      toolCallId: firstDefined(b.tool_call_id, b.toolCallId),
      params: firstDefined(b.tool_params, b.params),
      result: firstDefined(b.tool_result, b.result),
      isError: firstDefined(b.tool_is_error, b.isError),
      resultEventType: firstDefined(b.result_event_type, b.resultEventType),
      timing: b.tool_duration_ms !== undefined ? {durationMs: Number(b.tool_duration_ms)} : (b.timing !== undefined ? b.timing : (b.duration_ms !== undefined ? {durationMs: Number(b.duration_ms)} : null)),
      model: b.model,
      source: firstDefined(b.source, b.viz_source),
      lineNo: firstDefined(b.line_no, b.lineNo, b.id),
      timestamp: b.timestamp,
      id: b.id || ("b-"+(b.line_no||b.lineNo||Math.random())),
      // trajectory / prompt_profile / correlation fields
      loopName: firstDefined(b.loop_name, b.loopName),
      taskId: firstDefined(b.task_id, b.taskId),
      nonce: firstDefined(b.nonce, b.nonce_value),
      trajectoryKind: firstDefined(b.trajectory_kind, b.trajectoryKind),
      promptBytes: firstDefined(b.prompt_bytes, b.promptBytes),
      promptTokens: firstDefined(b.prompt_tokens, b.promptTokens),
      promptLines: firstDefined(b.prompt_lines, b.promptLines),
      roleStats: b.role_stats || b.roleStats || [],
      sections: b.sections || []
    };
  }

  // firstDefined 返回第一个不是 undefined / null 的参数。
  function firstDefined(){
    for(var i=0;i<arguments.length;i++){
      if(arguments[i] !== undefined && arguments[i] !== null) return arguments[i];
    }
    return undefined;
  }

  function renderContextBlock(raw){
    var b = normalizeProjectedBlock(raw);
    var tone = "cat-meta";
    var title = b.type.toUpperCase();
    var bodyStyle = "";
    if(b.type==="system"){tone="cat-config"; bodyStyle="background:var(--surface-1)"}
    else if(b.type==="user"){tone="cat-user"; bodyStyle="background:color-mix(in oklab,var(--color-user) 8%,var(--surface-1))"}
    else if(b.type==="assistant"){tone="cat-assistant";}
    else if(b.type==="think"){tone="cat-ephemeral"; bodyStyle="font-style:italic;color:var(--fg-2)"}
    else if(b.type==="tool_call" || b.type==="tool_result" || b.type==="tool_log"){tone="cat-tools"}
    else if(b.type==="prompt_profile"){tone="cat-config"}
    else if(b.type==="trajectory"){
      var k = b.trajectoryKind||"";
      if(k==="loop_enter"||k==="phase_start"){tone="cat-lifecycle"}
      else if(k==="user_input"){tone="cat-user"}
      else if(k==="subagent"){tone="cat-subagent"}
      else if(k==="iteration"){tone="cat-ephemeral"}
      else {tone="cat-lifecycle"}
    }

    var header = pill(tone, b.role||b.type);
    if(b.trajectoryKind) header += ' <span style="font-family:monospace;font-size:10px;color:var(--fg-3)">'+escapeHTML(b.trajectoryKind)+'</span>';
    if(b.loopName) header += ' <span style="font-family:monospace;font-size:10px;color:var(--color-cat-config)">loop:'+escapeHTML(b.loopName)+'</span>';
    if(b.nonce) header += ' <span style="font-family:monospace;font-size:10px;color:var(--fg-3)">nonce:'+escapeHTML(b.nonce)+'</span>';
    if(b.source && b.type!=="tool_call") header += ' <span style="font-family:monospace;font-size:10px;color:var(--fg-3)">'+escapeHTML(b.source)+'</span>';
    if(b.toolName) header += ' <span style="font-family:monospace;font-size:11px;color:var(--color-cat-tools)">'+escapeHTML(b.toolName)+'</span>';
    if(b.toolCallId && b.type!=="tool_call") header += ' <span style="font-family:monospace;font-size:10px;color:var(--fg-3)">#'+escapeHTML(truncate(b.toolCallId,12))+'</span>';
    if(b.timing && b.timing.durationMs !== undefined && b.timing.durationMs >= 0){
      header += ' <span style="font-family:monospace;font-size:10px;color:var(--fg-3)">'+Number(b.timing.durationMs).toFixed(0)+'ms</span>';
    } else if(b.timing && b.timing.durationSeconds !== undefined && b.timing.durationSeconds >= 0){
      header += ' <span style="font-family:monospace;font-size:10px;color:var(--fg-3)">'+Number(b.timing.durationSeconds).toFixed(2)+'s</span>';
    }
    if(b.model) header += ' <span style="font-family:monospace;font-size:10px;color:var(--color-cat-config)">'+escapeHTML(b.model)+'</span>';
    if(b.isError) header += pill("cat-sev-error", "error", "solid");

    var body = "";
    if(b.type==="tool_call"){
      var hasResult = b.result || b.resultEventType;
      var callOpen = b.isError ? 'block' : 'none';
      var callChev = b.isError ? '▾' : '▸';
      body = '<div style="padding:8px 12px;font-size:12px;line-height:1.6">'+
        '<div class="ctx-toggle" data-target="ctx-params-'+b.id+'" style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
          '<span class="chev">'+callChev+'</span>'+
          pill("cat-tools", "call")+
          '<span style="font-family:monospace;font-size:11px;color:var(--color-cat-tools)">'+escapeHTML(b.toolName||"unknown")+'</span>'+
          '<span style="font-size:10px;color:var(--fg-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px">'+escapeHTML(truncate(b.params||"",80))+'</span>'+
          (b.isError?pill("cat-sev-error","error","solid"):'')+
        '</div>'+
        '<pre id="ctx-params-'+b.id+'" style="display:'+callOpen+';margin:6px 0 0;padding:6px;background:var(--surface-0);border-radius:3px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:30vh;overflow:auto">'+escapeHTML(tryPrettyJSON(b.params||"{}"))+'</pre>';
      if(hasResult){
        var resultOpen = b.isError ? 'block' : 'none';
        var resultChev = b.isError ? '▾' : '▸';
        body +=
          '<div class="ctx-toggle" data-target="ctx-result-'+b.id+'" style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:8px">'+
            '<span class="chev">'+resultChev+'</span>'+
            pill("cat-tools", b.resultEventType==="tool_call_done"?"done":b.resultEventType==="tool_call_error"?"error":"result")+
            '<span style="font-size:10px;color:var(--fg-3)">'+(b.result||"").length+' chars</span>'+
          '</div>'+
          '<pre id="ctx-result-'+b.id+'" style="display:'+resultOpen+';margin:6px 0 0;padding:6px;background:var(--surface-0);border-radius:3px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:40vh;overflow:auto">'+escapeHTML(tryPrettyJSON(b.result||"{}"))+'</pre>';
      }
      body += '</div>';
    }else if(b.type==="tool_result" || b.type==="tool_log"){
      var id = "ctx-body-"+b.id;
      body = '<div style="padding:8px 12px">'+
        '<div class="ctx-toggle" data-target="'+id+'" style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
          '<span class="chev">▸</span>'+
          '<span style="font-size:10px;color:var(--fg-3)">'+(b.content||"").length+' chars</span>'+
        '</div>'+
        '<pre id="'+id+'" style="display:none;margin:6px 0 0;padding:6px;background:var(--surface-0);border-radius:3px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:40vh;overflow:auto">'+escapeHTML(tryPrettyJSON(b.content||"{}"))+'</pre>'+
      '</div>';
    }else if(b.type==="prompt_profile"){
      body = renderPromptProfileBody(b);
    }else if(b.type==="trajectory"){
      body = '<div style="padding:6px 12px;font-size:12px;line-height:1.5;color:var(--fg-2);white-space:pre-wrap;word-break:break-all">'+escapeHTML(b.content||"")+'</div>';
    }else{
      // assistant / think / user / system: auto-collapse long content (>200 chars).
      var contentText = b.content || "";
      var COLLAPSE_THRESHOLD = 200;
      if(contentText.length > COLLAPSE_THRESHOLD){
        var bodyId = "ctx-body-"+b.id;
        var preview = contentText.substring(0, COLLAPSE_THRESHOLD);
        body =
          '<div style="padding:8px 12px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;'+bodyStyle+'">'+
            escapeHTML(preview)+
            '<span id="'+bodyId+'-ellipsis" style="color:var(--fg-3)">… </span>'+
            '<span class="ctx-toggle" data-target="'+bodyId+'" style="color:var(--color-cat-conversation);cursor:pointer;font-size:11px">show more ('+contentText.length+' chars)</span>'+
          '</div>'+
          '<pre id="'+bodyId+'" style="display:none;margin:0;padding:8px 12px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;'+bodyStyle+'">'+escapeHTML(contentText)+'</pre>';
      } else {
        body = '<div style="padding:8px 12px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;'+bodyStyle+'">'+escapeHTML(contentText)+'</div>';
      }
    }

    return '<div class="ctx-block" data-line-no="'+b.lineNo+'" style="border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden">'+
      '<div style="padding:4px 8px;background:var(--surface-2);display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border-2)">'+header+'</div>'+
      body+
    '</div>';
  }

  function renderPromptProfileBody(b){
    var id = "ctx-prompt-"+b.id;
    var textId = "ctx-prompt-text-"+b.id;
    var summary = '';
    if(b.loopName) summary += 'loop: '+escapeHTML(b.loopName)+' · ';
    if(b.nonce) summary += 'nonce: '+escapeHTML(b.nonce)+' · ';
    if(b.promptBytes) summary += fmtBytes(Number(b.promptBytes))+' · ';
    if(b.promptTokens) summary += fmtTokens(Number(b.promptTokens))+' · ';
    if(b.promptLines) summary += b.promptLines+' lines · ';
    summary += (b.sections ? b.sections.length : 0)+' sections';
    var html = '<div style="padding:6px 12px;font-size:12px;line-height:1.5">'+
      '<div class="ctx-toggle" data-target="'+id+'" style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
        '<span class="chev">▸</span>'+
        '<span style="font-family:monospace;font-size:11px;color:var(--fg-2)">'+summary+'</span>'+
      '</div>'+
      '<div id="'+id+'" style="display:none;margin-top:6px">';
    if(b.roleStats && b.roleStats.length){
      html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">'+
        b.roleStats.map(function(r){
          return '<span style="font-size:10px;color:var(--fg-3);background:var(--surface-1);padding:2px 5px;border-radius:3px">'+escapeHTML(r.role||"?")+' '+fmtBytes(Number(r.bytes))+(r.tokens?' · '+fmtTokens(Number(r.tokens)):'')+'</span>';
        }).join("")+
      '</div>';
    }
    html += renderPromptSections(b.sections || [], 0);
    if(b.promptText){
      var pt = String(b.promptText);
      html += '<div style="margin-top:8px;border-top:1px solid var(--border-2);padding-top:6px">'+
        '<div class="ctx-toggle" data-target="'+textId+'" style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
          '<span class="chev">▸</span>'+
          pill("cat-config", "prompt text")+
          '<span style="font-family:monospace;font-size:10px;color:var(--fg-3)">'+escapeHTML(fmtBytes(pt.length))+'</span>'+
        '</div>'+
        '<pre id="'+textId+'" style="display:none;margin:6px 0 0;padding:6px;background:var(--surface-0);border-radius:3px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:60vh;overflow:auto">'+escapeHTML(pt)+'</pre>'+
      '</div>';
    }
    html += '</div></div>';
    return html;
  }

  function renderPromptSections(sections, depth){
    if(!sections || !sections.length) return '';
    var html = '<div style="'+(depth>0?'padding-left:12px;border-left:2px solid var(--border-2);margin-left:4px':'')+'">';
    sections.forEach(function(s){
      var hasChildren = s.children && s.children.length;
      var id = 'ctx-sec-'+(Math.random().toString(36).slice(2,9));
      var label = escapeHTML(s.label || s.key || 'section');
      var meta = [];
      if(s.role) meta.push(s.role);
      if(s.bytes) meta.push(fmtBytes(Number(s.bytes)));
      if(s.tokens) meta.push(fmtTokens(Number(s.tokens)));
      if(s.hash) meta.push('hash:'+escapeHTML(truncate(s.hash,12)));
      html += '<div style="margin:3px 0">';
      if(s.summary){
        html += '<div class="ctx-toggle" data-target="'+id+'" style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
          '<span class="chev">▸</span>'+
          '<span style="font-size:11px;color:var(--fg-1);font-weight:500">'+label+'</span>'+
          '<span style="font-size:10px;color:var(--fg-3)">'+meta.join(' · ')+'</span>'+
        '</div>'+
        '<pre id="'+id+'" style="display:none;margin:4px 0 0;padding:6px;background:var(--surface-0);border-radius:3px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:25vh;overflow:auto">'+escapeHTML(s.summary)+'</pre>';
      }else{
        html += '<div style="display:flex;align-items:center;gap:6px">'+
          '<span style="font-size:11px;color:var(--fg-1);font-weight:500">'+label+'</span>'+
          '<span style="font-size:10px;color:var(--fg-3)">'+meta.join(' · ')+'</span>'+
        '</div>';
      }
      if(hasChildren){
        html += renderPromptSections(s.children, depth+1);
      }
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function bindContextFilters(container, ctx){
    var agentSel = document.getElementById("ctxAgentFilter");
    var loopSel = document.getElementById("ctxLoopFilter");
    var phaseSel = document.getElementById("ctxPhaseFilter");
    var modeSel = document.getElementById("ctxViewMode");
    var internalCb = document.getElementById("ctxShowInternal");
    if(agentSel){
      agentSel.onchange = function(){
        contextState.agentFilter = agentSel.value;
        container.innerHTML = renderContextUI(ctx);
        bindContextToggles();
        bindContextFilters(container, ctx);
      };
    }
    if(loopSel){
      loopSel.onchange = function(){
        contextState.loopFilter = loopSel.value;
        container.innerHTML = renderContextUI(ctx);
        bindContextToggles();
        bindContextFilters(container, ctx);
      };
    }
    if(phaseSel){
      phaseSel.onchange = function(){
        contextState.phaseFilter = phaseSel.value;
        container.innerHTML = renderContextUI(ctx);
        bindContextToggles();
        bindContextFilters(container, ctx);
      };
    }
    if(modeSel){
      modeSel.onchange = function(){
        contextState.viewMode = modeSel.value;
        container.innerHTML = renderContextUI(ctx);
        bindContextToggles();
        bindContextFilters(container, ctx);
      };
    }
    if(internalCb){
      internalCb.onchange = function(){
        contextState.showInternal = internalCb.checked;
        container.innerHTML = renderContextUI(ctx);
        bindContextToggles();
        bindContextFilters(container, ctx);
      };
    }
    var trajCb = document.getElementById("ctxShowTrajectory");
    if(trajCb){
      trajCb.onchange = function(){
        contextState.showTrajectory = trajCb.checked;
        container.innerHTML = renderContextUI(ctx);
        bindContextToggles();
        bindContextFilters(container, ctx);
      };
    }
  }

  function bindContextToggles(){
    document.querySelectorAll(".ctx-toggle").forEach(function(el){
      el.onclick = function(){
        var target = document.getElementById(el.getAttribute("data-target"));
        if(!target) return;
        var open = target.style.display!=="none";
        target.style.display = open?"none":"block";
        var chev = el.querySelector(".chev");
        if(chev) chev.textContent = open?"▸":"▾";
        // For the assistant/think "show more" pattern: hide the preview
        // ellipsis + toggle link when expanding, restore when collapsing.
        var ellipsis = document.getElementById(target.id+"-ellipsis");
        if(ellipsis) ellipsis.style.display = open?"":"none";
        if(!chev) el.style.display = open?"":"none";
      };
    });
  }

  // ── Trajectory tab ─────────────────────────────────────────
  function renderTrajectoryTab(container){
    function renderTrajectory(resp){
      var root = resp.root;
      if(!root){
        container.innerHTML = '<div class="empty"><div class="icon">Tree</div>No trajectory data.</div>';
        return;
      }
      container.innerHTML =
        '<div style="margin-bottom:10px;font-size:11px;color:var(--fg-3)">Click a node to jump to the first block in Context.</div>'+
        renderTrajectoryNode(root, 0);
      container.querySelectorAll(".traj-node").forEach(function(el){
        el.onclick = function(ev){
          // If the click is on the prompt detail button, let its own handler run.
          if(ev.target.classList.contains("traj-prompt-btn")) return;
          var targetLines = (el.getAttribute("data-block-lines")||"").split(",").filter(function(x){return x!==""}).map(function(x){return parseInt(x,10);});
          var fallbackLine = parseInt(el.getAttribute("data-enter-line"), 10);
          state.currentTab = "context";
          renderTabBar();
          renderTab();
          // After context renders, jump to the first exact block line if available,
          // otherwise fall back to the first block whose lineNo >= enter_line.
          setTimeout(function(){
            var blocks = document.querySelectorAll(".ctx-block");
            var matched = null;
            if(targetLines.length){
              for(var i=0;i<blocks.length;i++){
                var b = blocks[i];
                var lineNo = parseInt(b.getAttribute("data-line-no"), 10);
                if(targetLines.indexOf(lineNo)>=0){
                  matched = b;
                  break;
                }
              }
            }
            if(!matched && fallbackLine){
              for(var i=0;i<blocks.length;i++){
                var b = blocks[i];
                var lineNo = parseInt(b.getAttribute("data-line-no"), 10);
                if(lineNo>=fallbackLine){
                  matched = b;
                  break;
                }
              }
            }
            if(matched){
              matched.scrollIntoView({behavior:"smooth", block:"start"});
              matched.style.borderColor = "var(--color-cat-conversation)";
              setTimeout(function(){matched.style.borderColor="";}, 1500);
            }
          }, 50);
        };
      });

      // Prompt detail button: switch to Context tab and open the first prompt_profile
      // block whose lineNo is in the trajectory node's block_line_nos.
      container.querySelectorAll(".traj-prompt-btn").forEach(function(btn){
        btn.onclick = function(ev){
          ev.stopPropagation();
          var targetLines = (btn.getAttribute("data-block-lines")||"").split(",").filter(function(x){return x!==""}).map(function(x){return parseInt(x,10);});
          state.currentTab = "context";
          renderTabBar();
          renderTab();
          setTimeout(function(){
            var blocks = document.querySelectorAll(".ctx-block");
            var matched = null;
            for(var i=0;i<blocks.length;i++){
              var b = blocks[i];
              var lineNo = parseInt(b.getAttribute("data-line-no"), 10);
              if(targetLines.indexOf(lineNo)>=0){
                matched = b;
                break;
              }
            }
            if(matched){
              matched.scrollIntoView({behavior:"smooth", block:"start"});
              matched.style.borderColor = "var(--color-cat-conversation)";
              setTimeout(function(){matched.style.borderColor="";}, 1500);
              // Open the prompt text toggle if present
              var promptTextToggle = matched.querySelector('[data-target^="ctx-prompt-text-"]');
              if(promptTextToggle){
                var target = document.getElementById(promptTextToggle.getAttribute("data-target"));
                if(target && target.style.display === "none"){
                  target.style.display = "block";
                  var chev = promptTextToggle.querySelector(".chev");
                  if(chev) chev.textContent = "▾";
                }
              }
            }
          }, 50);
        };
      });
    }

    // Cache: skip fetch if we already have data for this session.
    if(state.trajectoryData && state.cachedSession === state.currentSession){
      renderTrajectory(state.trajectoryData);
      return;
    }
    container.innerHTML = '<div class="empty">Loading trajectory...</div>';
    apiGet("/sessions/"+encodeURIComponent(state.currentSession)+"/trajectory").then(function(resp){
      state.trajectoryData = resp;
      state.cachedSession = state.currentSession;
      renderTrajectory(resp);
    }).catch(function(err){
      container.innerHTML = '<div class="empty">Error: '+escapeHTML(err.message)+'</div>';
    });
  }

  function renderTrajectoryNode(node, depth){
    if(!node) return '';
    // Use short textual symbols (no emoji) to match the rest of the UI.
    var symbol = {
      session: '◆',
      phase: '◇',
      loop: '↻',
      subagent: '⊃',
      iteration: '·',
      focus_on: '▸',
      lose_focus: '◂'
    }[node.kind] || '·';
    var tone = 'cat-lifecycle';
    if(node.kind==='session') tone='cat-conversation';
    else if(node.kind==='phase') tone='cat-lifecycle';
    else if(node.kind==='loop') tone='cat-config';
    else if(node.kind==='subagent') tone='cat-subagent';
    var meta = [];
    if(node.loop_name) meta.push('loop:'+node.loop_name);
    if(node.enter_line) meta.push('line '+node.enter_line+(node.exit_line?'-'+node.exit_line:''));
    if(node.block_line_nos && node.block_line_nos.length) meta.push(node.block_line_nos.length+' blocks');
    var promptDetailAction = '';
    if(node.block_line_nos && node.block_line_nos.length){
      promptDetailAction = '<button class="traj-prompt-btn" data-block-lines="'+(node.block_line_nos||[]).join(',')+'" style="margin-left:auto;background:var(--surface-2);border:1px solid var(--border);color:var(--fg-2);border-radius:3px;padding:1px 5px;cursor:pointer;font-size:10px;font-family:monospace">prompt</button>';
    }
    var html =
      '<div class="traj-node" data-enter-line="'+(node.enter_line||'')+'" data-block-lines="'+(node.block_line_nos||[]).join(',')+'" style="padding:5px 0 5px '+(depth*16)+'px;cursor:pointer;border-bottom:1px solid var(--border-2)" title="Click to jump">'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<span style="font-size:12px;color:var(--fg-3);font-family:monospace;width:14px;text-align:center">'+symbol+'</span>'+
          pill(tone, node.kind)+
          '<span style="font-size:12px;color:var(--fg-1);font-weight:500">'+escapeHTML(node.label||node.node_id)+'</span>'+
          (node.summary?'<span style="font-size:10px;color:var(--fg-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px">'+escapeHTML(truncate(node.summary,60))+'</span>':'')+
          promptDetailAction+
        '</div>'+
        '<div style="margin-top:2px;padding-left:22px;font-size:10px;color:var(--fg-3);font-family:monospace">'+escapeHTML(meta.join(' · '))+'</div>'+
      '</div>';
    if(node.children && node.children.length){
      html += node.children.map(function(c){ return renderTrajectoryNode(c, depth+1); }).join("");
    }
    return html;
  }

  // ── Timeline tab ───────────────────────────────────────────
  function renderTimelineTab(container){
    function renderTimeline(resp){
      var tasks = resp.tasks || [];
      if(tasks.length===0){
        container.innerHTML = '<div class="empty"><div class="icon">Cal</div>No timeline data.</div>';
        return;
      }
      container.innerHTML =
        '<div class="stats-grid">'+
          statCard("Tasks", tasks.length)+
          statCard("Total Events", tasks.reduce(function(s,t){return s+t.event_count},0))+
        '</div>'+
        tasks.map(function(task, i){
          return '<div class="turn-card" data-idx="'+i+'">'+
            '<div class="turn-header" data-open="false">'+
              '<span style="color:var(--color-cat-lifecycle);font-family:monospace;font-size:11px">task '+escapeHTML(task.task_index)+'</span>'+
              '<span style="color:var(--fg-3);font-size:11px">'+task.event_count+' events</span>'+
              '<span style="margin-left:auto;color:var(--fg-3);font-size:10px">▸</span>'+
            '</div>'+
            '<div class="turn-body" style="display:none">'+
              task.events.map(function(e){
                var ts = e.timestamp ? (e.timestamp>1e12 ? e.timestamp : e.timestamp*1000) : null;
                return '<div style="display:flex;gap:6px;padding:2px 0;font-size:11px">'+
                  '<span style="font-family:monospace;font-size:10px;color:var(--fg-3);width:60px">'+fmtWallClock(ts)+'</span>'+
                  pill(typeInfo(e.type).tone, typeInfo(e.type).label)+
                  '<span style="color:var(--fg-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escapeHTML(truncate(e.content||e.stream_delta||"",80))+'</span>'+
                '</div>';
              }).join("")+
            '</div>'+
          '</div>';
        }).join("");
      // Bind toggle
      container.querySelectorAll(".turn-header").forEach(function(hdr){
        hdr.onclick = function(){
          var body = hdr.nextElementSibling;
          var open = hdr.getAttribute("data-open")==="true";
          body.style.display = open?"none":"block";
          hdr.setAttribute("data-open", open?"false":"true");
          hdr.querySelector("span:last-child").textContent = open?"▸":"▾";
        };
      });
    }
    if(state.timelineData && state.cachedSession === state.currentSession){
      renderTimeline(state.timelineData);
      return;
    }
    container.innerHTML = '<div class="empty">Loading timeline...</div>';
    apiGet("/sessions/"+encodeURIComponent(state.currentSession)+"/timeline").then(function(resp){
      state.timelineData = resp;
      state.cachedSession = state.currentSession;
      renderTimeline(resp);
    }).catch(function(err){
      container.innerHTML = '<div class="empty">Error: '+escapeHTML(err.message)+'</div>';
    });
  }

  // ── Tools tab ──────────────────────────────────────────────
  function renderToolsTab(container){
    function renderTools(resp){
      var tcs = resp.tool_calls || [];
      if(tcs.length===0){
        container.innerHTML = '<div class="empty"><div class="icon">Tool</div>No tool calls found.</div>';
        return;
      }
      var html = '<div style="margin-bottom:8px;font-family:monospace;font-size:11px;color:var(--fg-3)">'+tcs.length+' tool calls · click to expand</div>';
      html += tcs.map(function(tc, idx){
        var statusPill = pill(
          tc.status==="done"?"cat-sev-success":tc.status==="error"?"cat-sev-error":tc.status==="cancelled"?"cat-meta":"cat-ephemeral",
          tc.status
        );
        var id = 'tc-'+idx+'-'+Math.random().toString(36).slice(2,7);
        var params = tc.params || "";
        var result = tc.result || tc.error || "";
        // Header line: tool name, status, duration, reason summary, time
        var header = pill("cat-tools", tc.tool_name||truncate(tc.call_tool_id,12))+
          ' '+statusPill+
          (tc.duration_ms>0?' <span class="mono" style="font-size:10px;color:var(--fg-3)">'+fmtDuration(tc.duration_ms)+'</span>':'')+
          (tc.reason?' <span style="font-size:11px;color:var(--fg-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;display:inline-block;vertical-align:middle">'+escapeHTML(truncate(tc.reason,80))+'</span>':'')+
          ' <span class="mono" style="font-size:10px;color:var(--fg-3);float:right">'+fmtWallClock(tc.start_time?(tc.start_time>1e12?tc.start_time:tc.start_time*1000):null)+'</span>';
        var body = '';
        if(params){
          body += '<div class="ctx-toggle" data-target="tc-params-'+id+'" style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
            '<span class="chev">▸</span>'+pill("cat-tools","params")+
            '<span style="font-size:10px;color:var(--fg-3)">'+params.length+' chars</span>'+
          '</div>'+
          '<pre id="tc-params-'+id+'" style="display:none;margin:6px 0 0;padding:6px;background:var(--surface-0);border-radius:3px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:30vh;overflow:auto">'+escapeHTML(tryPrettyJSON(params))+'</pre>';
        }
        if(result){
          body += '<div class="ctx-toggle" data-target="tc-result-'+id+'" style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:6px">'+
            '<span class="chev">▸</span>'+pill(tc.error?"cat-sev-error":"cat-tools", tc.error?"error":"result")+
            '<span style="font-size:10px;color:var(--fg-3)">'+result.length+' chars</span>'+
          '</div>'+
          '<pre id="tc-result-'+id+'" style="display:none;margin:6px 0 0;padding:6px;background:var(--surface-0);border-radius:3px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:40vh;overflow:auto">'+escapeHTML(tryPrettyJSON(result))+'</pre>';
        }
        if(tc.summary){
          body += '<div style="margin-top:6px;font-size:11px;color:var(--fg-2);white-space:pre-wrap;word-break:break-all">'+escapeHTML(tc.summary)+'</div>';
        }
        return '<div class="ctx-block" style="border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden">'+
          '<div style="padding:6px 10px;background:var(--surface-2);display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border-2)">'+header+'</div>'+
          '<div style="padding:8px 12px">'+body+'</div>'+
        '</div>';
      }).join('');
      container.innerHTML = html;
      bindContextToggles();
    }
    if(state.toolsData && state.toolsData.length && state.cachedSession === state.currentSession){
      renderTools(state.toolsData);
      return;
    }
    container.innerHTML = '<div class="empty">Loading tool calls...</div>';
    apiGet("/sessions/"+encodeURIComponent(state.currentSession)+"/tools").then(function(resp){
      state.toolsData = resp;
      state.cachedSession = state.currentSession;
      renderTools(resp);
    }).catch(function(err){
      container.innerHTML = '<div class="empty">Error: '+escapeHTML(err.message)+'</div>';
    });
  }

  // ── Stats tab ──────────────────────────────────────────────
  function renderStatsTab(container){
    function renderStats(st){
      container.innerHTML =
        '<div class="stats-grid">'+
          statCard("Total Events", st.total_events)+
          statCard("Tool Calls", st.tool_call_count)+
          statCard("Stream Events", st.stream_count)+
          statCard("AI Calls", st.ai_call_count)+
          statCard("Input Tokens", fmtTokens(st.input_tokens))+
        '</div>';
      if(st.model_breakdown && st.model_breakdown.length>0){
        container.innerHTML +=
          '<table class="model-table"><thead><tr><th>Model</th><th>Calls</th></tr></thead><tbody>'+
          st.model_breakdown.map(function(m){
            return '<tr><td style="color:var(--color-cat-config);font-weight:600">'+escapeHTML(m.model)+'</td><td>'+m.call_count+'</td></tr>';
          }).join("")+'</tbody></table>';
      }
    }
    if(state.statsData && state.cachedSession === state.currentSession){
      renderStats(state.statsData);
      return;
    }
    container.innerHTML = '<div class="empty">Loading stats...</div>';
    apiGet("/sessions/"+encodeURIComponent(state.currentSession)+"/stats").then(function(st){
      state.statsData = st;
      state.cachedSession = state.currentSession;
      renderStats(st);
    }).catch(function(err){
      container.innerHTML = '<div class="empty">Error: '+escapeHTML(err.message)+'</div>';
    });
  }

  function statCard(label, value, cls){
    return '<div class="stat-card"><div class="label">'+label+'</div><div class="value'+(cls?" "+cls:"")+'">'+value+'</div></div>';
  }

  // ── Init ────────────────────────────────────────────────────
  renderRail();
  loadSessions();
  refreshBtn.onclick = function(){loadSessions()};
  // Auto-refresh session list every 5s
  setInterval(loadSessions, 5000);

})();
</script>
</body>
</html>
