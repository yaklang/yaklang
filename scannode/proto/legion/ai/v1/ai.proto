syntax = "proto3";

package legion.ai.v1;

import "google/protobuf/timestamp.proto";
import "legion/node/v1/node.proto";

option go_package = "github.com/yaklang/yaklang/scannode/gen/legionpb/legion/ai/v1;aiv1";

message AISessionRef {
  string session_id = 1;
  string run_id = 2;
}

message AISessionAttachmentRef {
  string attachment_id = 1;
  string object_key = 2;
  string filename = 3;
  string content_type = 4;
  uint64 size_bytes = 5;
  string sha256 = 6;
  string download_url = 7;
}

message AISessionCredentialRef {
  string credential_id = 1;
  string credential_type = 2;
  string scope = 3;
}

message BindAISessionCommand {
  legion.node.v1.CommandMetadata metadata = 1;
  string target_node_id = 2;
  AISessionRef session = 3;
  string owner_user_id = 4;
  string project_id = 5;
  string title = 6;
  bytes provider_policy_snapshot_json = 7;
  bytes runtime_option_snapshot_json = 8;
  repeated AISessionAttachmentRef attachments = 9;
  repeated AISessionCredentialRef credential_refs = 10;
}

message PushAISessionInputCommand {
  legion.node.v1.CommandMetadata metadata = 1;
  AISessionRef session = 2;
  string owner_user_id = 3;
  string input_type = 4;
  bytes input_json = 5;
}

message AppendAISessionContextCommand {
  legion.node.v1.CommandMetadata metadata = 1;
  AISessionRef session = 2;
  string owner_user_id = 3;
  repeated AISessionAttachmentRef attachments = 4;
  repeated AISessionCredentialRef credential_refs = 5;
  string reason = 6;
}

message CancelAISessionCommand {
  legion.node.v1.CommandMetadata metadata = 1;
  AISessionRef session = 2;
  string owner_user_id = 3;
  string reason = 4;
}

message CloseAISessionCommand {
  legion.node.v1.CommandMetadata metadata = 1;
  AISessionRef session = 2;
  string owner_user_id = 3;
  string reason = 4;
}

message AIProviderPreviewConfigSnapshot {
  string provider_type = 1;
  string base_url = 2;
  string api_type = 3;
  string domain = 4;
  string proxy = 5;
  string endpoint = 6;
  bool enable_endpoint = 7;
  bool no_https = 8;
  string api_key = 9;
  string default_model = 10;
  map<string, string> headers = 11;
}

message ListAIProviderModelsCommand {
  legion.node.v1.CommandMetadata metadata = 1;
  string target_node_id = 2;
  string owner_user_id = 3;
  AIProviderPreviewConfigSnapshot provider = 4;
}

message AIProviderPreviewModel {
  string model_id = 1;
  string label = 2;
}

message AIProviderModelsListed {
  legion.node.v1.EventMetadata metadata = 1;
  string owner_user_id = 2;
  repeated AIProviderPreviewModel items = 3;
}

message AIProviderModelsFailed {
  legion.node.v1.EventMetadata metadata = 1;
  string owner_user_id = 2;
  string error_code = 3;
  string error_message = 4;
}

message HealthCheckAIProviderCommand {
  legion.node.v1.CommandMetadata metadata = 1;
  string target_node_id = 2;
  string owner_user_id = 3;
  AIProviderPreviewConfigSnapshot provider = 4;
  string content = 5;
}

message AIProviderHealthCheckCompleted {
  legion.node.v1.EventMetadata metadata = 1;
  string owner_user_id = 2;
  int64 first_byte_cost_ms = 3;
  int64 total_cost_ms = 4;
  string raw_request = 5;
  int32 response_status_code = 6;
  string response_content = 7;
  string error_message = 8;
  string raw_response = 9;
  AIProviderPreviewConfigSnapshot recommend_config = 10;
  bool success = 11;
}

message AIProviderHealthCheckFailed {
  legion.node.v1.EventMetadata metadata = 1;
  string owner_user_id = 2;
  string error_code = 3;
  string error_message = 4;
}

message AISessionReady {
  legion.node.v1.EventMetadata metadata = 1;
  AISessionRef session = 2;
  string runtime_name = 3;
  string runtime_version = 4;
  google.protobuf.Timestamp ready_at = 5;
}

message AISessionEvent {
  legion.node.v1.EventMetadata metadata = 1;
  AISessionRef session = 2;
  uint64 seq = 3;
  string event_type = 4;
  bytes payload_json = 5;
}

message AISessionDone {
  legion.node.v1.EventMetadata metadata = 1;
  AISessionRef session = 2;
  google.protobuf.Timestamp finished_at = 3;
  bytes result_json = 4;
}

message AISessionFailed {
  legion.node.v1.EventMetadata metadata = 1;
  AISessionRef session = 2;
  google.protobuf.Timestamp finished_at = 3;
  string error_code = 4;
  string error_message = 5;
  bytes error_detail_json = 6;
}

message AISessionCancelled {
  legion.node.v1.EventMetadata metadata = 1;
  AISessionRef session = 2;
  google.protobuf.Timestamp finished_at = 3;
  string reason = 4;
}
